<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الـ 40 - نسخة باب الحارة والأسئلة الصعبة</title>
    <style>
        :root { --accent: #ffae00; --dark-bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: var(--text); margin: 0; text-align: center; overflow: hidden; }
        .setup-screen { padding: 20px; height: 100vh; overflow-y: auto; }
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; max-width: 1000px; margin: 20px auto; }
        .cat-btn { background: var(--card-bg); border: 1px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .cat-btn.selected { border-color: var(--accent); background: #332b00; box-shadow: 0 0 10px var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; margin: 20px 0; font-weight: bold; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .game-area { display: grid; gap: 15px; padding: 15px; height: calc(100vh - 70px); overflow-y: auto; }
        .cat-row { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #333; }
        .cat-name { color: var(--accent); font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        .val-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .val-btn { background: #333; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 5px; cursor: pointer; color: #fff; }
        .val-btn.used { opacity: 0; pointer-events: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; z-index: 1000; }
        .timer { font-size: 4rem; color: #00ff88; font-weight: bold; margin-bottom: 20px; }
        .question { font-size: 1.8rem; line-height: 1.4; margin-bottom: 30px; }
        .answer { font-size: 1.6rem; color: #00ff88; border: 2px dashed #00ff88; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: none; }
        .score-btns { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .score-btn { flex: 1; padding: 15px; border-radius: 5px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="setup" class="setup-screen">
    <h1 style="color:var(--accent)">🏆 تحدي الـ 40 - نسخة باب الحارة</h1>
    <p>اختر 6 فئات (تأكد من اختيار باب الحارة للتحدي):</p>
    <div id="cats" class="cat-grid"></div>
    <button id="start" class="btn-main" style="display:none" onclick="initGame()">ابدأ المواجهة</button>
</div>

<div id="game" style="display:none">
    <div class="header">
        <div style="color:#00ff88">فريق 1: <span id="p1">0</span></div>
        <div id="turn" style="color:var(--accent)">دور فريق 1</div>
        <div style="color:#00ff88">فريق 2: <span id="p2">0</span></div>
    </div>
    <div id="board" class="game-area"></div>
</div>

<div id="qBox" class="modal">
    <div id="clock" class="timer">0</div>
    <div id="qTxt" class="question"></div>
    <div id="aTxt" class="answer"></div>
    <button id="showA" class="btn-main" onclick="reveal()">كشف الإجابة</button>
    <div id="ctrls" class="score-btns" style="display:none">
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(1)">صح ف1</button>
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(2)">صح ف2</button>
        <button class="score-btn" style="background:#c62828" onclick="closeQ()">خطأ</button>
    </div>
</div>

<script>
const data = {
    "باب الحارة (تحدي)": {
        200: ["ما هو الاسم الكامل لشخصية 'الإدشري' وما هو الذنب الذي ظل يطارده؟", "سطيف، قتله للحارس (أبو سمعو) وسرقة الذهب"],
        400: ["في أي جزء ظهرت شخصية 'مأمون بيك' (الجاسوس) ومن هو الممثل الذي جسدها؟", "الجزء الرابع، الممثل فايز قزق"],
        600: ["ما صلة القرابة الحقيقية بين 'النمس' و 'الواوي' وكيف انتهت قصتهما؟", "توأم، قتله معتز (أو قتل النمس لأخيه الواوي في الجزء السادس)"]
    },
    "سيرة نبوية": {200:["ما اسم الناقة التي هاجر عليها النبي ﷺ؟","القصواء"], 400:["من هو الصحابي الذي نزل فيه صدر سورة عبس؟","عبد الله بن أم مكتوم"], 600:["كم عدد الأجنحة التي رآها النبي ﷺ لجبريل عليه السلام؟","600 جناح"]},
    "تاريخ الدول": {200:["من هو المؤسس الحقيقي للدولة العباسية؟","أبو جعفر المنصور"], 400:["من هو القائد المسلم الذي بنى مدينة القيروان؟","عقبة بن نافع"], 600:["ما هو الاسم القديم لمدينة إسطنبول قبل الفتح الإسلامي؟","القسطنطينية (بيزنطة)"]},
    "فيزياء": {200:["ما هي وحدة قياس القوة؟","النيوتن"], 400:["ما هو اللون الذي ينتج عن دمج جميع ألوان الطيف؟","الأبيض"], 600:["ما هو اسم القوة التي تربط الكواركات ببعضها داخل البروتون؟","القوة النووية القوية (الغلوونات)"]},
    "كيمياء": {200:["ما هو الغاز المسبب لظاهرة الاحتباس الحراري بشكل رئيسي؟","ثاني أكسيد الكربون"], 400:["ما هو العنصر الكيميائي الذي يمثل 78% من هواء الأرض؟","النيتروجين"], 600:["ما هو الاسم الكيميائي لملح الطعام؟","كلوريد الصوديوم"]},
    "عواصم": {200:["عاصمة سويسرا؟","بيرن"], 400:["عاصمة إستونيا؟","تالين"], 600:["عاصمة نيجيريا؟","أبوجا"]},
    "فضاء": {200:["كوكب يلقب بالكوكب الأحمر؟","المريخ"], 400:["ما هي أكبر مجرة قريبة من مجرتنا؟","أندروميدا"], 600:["ما هو اسم التلسكوب الفضائي الذي أطلق عام 2021؟","جيمس ويب"]},
    "أدب عربي": {200:["من هو صاحب كتاب 'البخلاء'؟","الجاحظ"], 400:["من هو الشاعر الذي لقب بـ 'مالك القوافي'؟","المتنبي"], 600:["ما هو الاسم الحقيقي للشاعر 'أدونيس'؟","علي أحمد سعيد إسبر"]},
    "رياضيات": {200:["ما هو العدد الذي ليس له معكوس ضربي؟","الصفر"], 400:["كم يساوي الرقم الروماني 'L'؟","50"], 600:["ما هو أول عدد مثالي (يساوي مجموع قواسمه عدا نفسه)؟","6"]},
    "أحياء": {200:["ما هو أكبر عضو في جسم الإنسان؟","الجلد"], 400:["ما هي فصيلة الدم التي تسمى 'المستقبل العام'؟","AB+"], 600:["ما هو الهرمون الملقب بهرمون 'الكر والفر'؟","الأدرينالين"]},
    "تقنية": {200:["ماذا تعني اختصار 'URL'؟","محدد موقع الموارد الموحد"], 400:["من هو مؤسس لغة بايثون؟","غيدو فان روسم"], 600:["ما هو اسم أول متصفح ويب في التاريخ؟","WorldWideWeb (Nexus)"]},
    "سينما": {200:["من هو مخرج فيلم 'الرسالة'؟","مصطفى العقاد"], 400:["ما هو الفيلم الذي فاز بأكبر عدد من جوائز الأوسكار (11 جائزة)؟","تايتانيك (أو بن هور أو سيد الخواتم)"], 600:["من هو الممثل صاحب أكبر عدد من أدوار 'جيمس بوند'؟","روجر مور (7 أفلام)"]},
    "حضارات": {200:["من بنى حدائق بابل المعلقة؟","نبوزنصر الثاني"], 400:["أين قامت حضارة 'الأنكا'؟","البيرو (جبال الأنديز)"], 600:["ما هو اسم الكتاب المقدس عند الفرس القدامى؟","الأفستا"]},
    "لغات": {200:["ما هي اللغة الرسمية في البرازيل؟","البرتغالية"], 400:["ما هي اللغة التي تكتب بحروف الـ 'كانجي'؟","اليابانية"], 600:["ما هي عائلة اللغات التي تنتمي إليها الفارسية والكردية؟","الهندو-أوروبية"]},
    "اختراعات": {200:["من اخترع المصباح الكهربائي؟","توماس إديسون"], 400:["من اخترع المحرك النفاث؟","فرانك ويتل"], 600:["من اخترع آلة التصوير الضوئي (الفوتوغراف)؟","لويس داغير"]},
    "جغرافيا": {200:["ما هو أصغر محيط في العالم؟","المحيط المتجمد الشمالي"], 400:["ما هو أعلى شلال في العالم؟","شلالات أنجيل (فنزويلا)"], 600:["ما هي الدولة التي تمتلك أكبر عدد من المناطق الزمنية؟","فرنسا (بسبب أراضيها وراء البحار)"]},
    "إسلاميات": {200:["ما هي السورة التي بدأت بدون بسملة؟","التوبة"], 400:["من هو أول مؤذن في الإسلام؟","بلال بن رباح"], 600:["كم عدد السجدات في القرآن الكريم؟","15 سجدة"]},
    "طيور": {200:["طائر لا يطير ويعيش في نيوزيلندا؟","الكيوي"], 400:["ما هو أسرع كائن حي في العالم؟","الصقر الجوال"], 600:["ما هو الطائر الذي ينام وهو يطير؟","السمامة (Swift)"]},
    "حيوانات": {200:["ما هو الحيوان الذي قلبه في رأسه؟","الجمبري (الروبيان)"], 400:["كم عدد أرجل العنكبوت؟","8 أرجل"], 600:["ما هو الحيوان الذي لا يصدر أي صوت؟","الزرافة"]},
    "طب": {200:["ما هو الفيتامين الذي يسمى فيتامين الشمس؟","D"], 400:["أين توجد الغدة الدرقية؟","في الرقبة"], 600:["ما هو المرض الذي يسمى 'الداء السكري'؟","ارتفاع سكر الدم"]},
    "فنون": {200:["من رسم لوحة 'العشاء الأخير'؟","ليوناردو دافنشي"], 400:["ما هي المدرسة الفنية التي اشتهر بها 'سلفادور دالي'؟","السريالية"], 600:["ما هي الآلة الموسيقية التي تسمى 'هارب'؟","القيثارة"]},
    "رياضة": {200:["من هو الهداف التاريخي للمنتخبات؟","كريستيانو رونالدو"], 400:["كم عدد لاعبي فريق كرة الطائرة؟","6 لاعبين"], 600:["في أي مدينة أقيمت أول نسخة للألعاب الأولمبية الشتوية؟","شاموني (فرنسا)"]},
    "اقتصاد": {200:["ما هي العملة الرسمية في المكسيك؟","البيزو"], 400:["ما هو المصطلح الذي يعني 'السيولة النقديّة'؟","كاش"], 600:["من هو مؤسس شركة مايكروسوفت؟","بيل جيتس"]},
    "سيارات": {200:["ما هي جنسية شركة 'هيونداي'؟","كورية جنوبية"], 400:["ما هو شعار شركة 'لامبورغيني'؟","الثور"], 600:["ما هي أول سيارة وصلت لسرعة 400 كم/ساعة؟","بوجاتي فيرون"]},
    "منطق": {200:["كلما أخذت منه كبر؟","الحفرة"], 400:["يمشي بلا أرجل ويبكي بلا عينين؟","السحاب"], 600:["أخت خالك وليست خالتك؟","أمك"]},
    "تراث": {200:["ما هي الرقصة الشعبية في فلسطين؟","الدبكة"], 400:["ما اسم الزي الياباني التقليدي؟","الكيمونو"], 600:["ما هو أقدم مهرجان سينمائي في العالم؟","مهرجان فينيسيا"]},
    "فلسفة": {200:["من قال 'أنا أفكر إذن أنا موجود'؟","رينيه ديكارت"], 400:["من هو صاحب نظرية 'العقد الاجتماعي'؟","جان جاك روسو"], 600:["ما هي 'المثالية' في الفلسفة؟","اعتبار العقل أو الروح أساس الواقع"]},
    "أساطير": {200:["من هو إله الرعد عند اليونان؟","زيوس"], 400:["ما هو وحش 'لوخ نيس'؟","وحش أسطوري يسكن بحيرة في اسكتلندا"], 600:["من هي 'ميدوسا'؟","امرأة أسطورية شعرها من الأفاعي"]},
    "نباتات": {200:["أين توجد الغابات المطيرة 'الأمازون'؟","البرازيل"], 400:["ما هو النبات الذي يسمى 'الذهب الأخضر'؟","الفستق (أو الأفوكادو)"], 600:["ما هو أقدم كائن حي على الأرض؟","شجرة الصنوبر المعمرة"]},
    "بناء": {200:["أين يقع برج إيفل؟","باريس"], 400:["من صمم تمثال الحرية؟","فريدريك بارتولدي"], 600:["ما هو أطول جسر معلق في العالم؟","جسر تشاناكالي (تركيا)"]},
    "ساعات": {200:["كم دقيقة في اليوم؟","1440"], 400:["ما هي ساعة 'بيج بن'؟","ساعة لندن الشهيرة"], 600:["ما هي الساعة الذرية؟","ساعة تعتمد على اهتزاز الذرات بدقة متناهية"]},
    "بحار": {200:["ما هو البحر الذي يسمى 'بحر القلزم' قديماً؟","البحر الأحمر"], 400:["ما هو أعمق خندق في المحيطات؟","خندق ماريانا"], 600:["ما هو البحر الذي لا يغرق فيه أحد؟","البحر الميت"]},
    "حقائق": {200:["ما هو لون لسان الزرافة؟","أزرق داكن (أرجواني)"], 400:["كم عدد أسنان البعوضة؟","47 سنة"], 600:["ما هو العضو الذي ينمو طوال حياة الإنسان؟","الأذن والأنف"]},
    "برمجيات": {200:["ما هي لغة البرمجة 'جافا'؟","لغة كائنية التوجه"], 400:["ما هو نظام التشغيل 'أندرويد'؟","نظام مبني على نواة لينكس"], 600:["ماذا يعني اختصار 'API'؟","واجهة برمجة التطبيقات"]},
    "أفلام كرتون": {200:["من هو صديق 'سبونج بوب' الصدوق؟","بسيط"], 400:["ما اسم القرية التي يسكنها السنافر؟","قرية السنافر"], 600:["من هو مخترع شخصية 'ميكي ماوس'؟","والت ديزني"]},
    "أرقام": {200:["مربع الرقم 9؟","81"], 400:["كم عدد الثواني في الساعة؟","3600"], 600:["ما هو الرقم الذي يسمى 'العدد الذهبي'؟","1.618"]},
    "أمثال": {200:["من شب على شيء...؟","شاب عليه"], 400:["البعيد عن العين...؟","بعيد عن القلب"], 600:["ما معنى 'رجع بخفي حنين'؟","عاد بالخيبة"]},
    "أدب عالمي": {200:["من كتب 'روميو وجولييت'؟","شكسبير"], 400:["من كتب 'البؤساء'؟","فيكتور هوغو"], 600:["من هو صاحب رواية 'مئة عام من العزلة'؟","غابرييل غارسيا ماركيز"]},
    "كيمياء حيوية": {200:["ما هو سكر الفاكهة؟","الفركتوز"], 400:["ما هي المادة التي تعطي العضلات طاقتها؟","ATP"], 600:["ما هو الإنزيم الذي يهضم البروتين في المعدة؟","البيبسين"]},
    "طيور جارحة": {200:["ما هو ملك الطيور؟","النسر"], 400:["ما هو الطائر الذي يرى في الليل؟","البومة"], 600:["ما هو اسم صغير الصقر؟","فرخ (أو قرناس في مراحل معينة)"]}
};

let selected = [], sc = [0, 0], trn = 1, curV = 0, clock, timeElapsed = 0;

const grid = document.getElementById('cats');
Object.keys(data).forEach(c => {
    let d = document.createElement('div');
    d.className = 'cat-btn'; d.innerText = c;
    d.onclick = () => {
        if(d.classList.contains('selected')) {
            d.classList.remove('selected'); selected = selected.filter(x => x !== c);
        } else if(selected.length < 6) {
            d.classList.add('selected'); selected.push(c);
        }
        document.getElementById('start').style.display = selected.length === 6 ? 'inline-block' : 'none';
    };
    grid.appendChild(d);
});

function initGame() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    const b = document.getElementById('board');
    selected.forEach(c => {
        let r = document.createElement('div');
        r.className = 'cat-row';
        r.innerHTML = `<div class="cat-name">${c}</div><div class="val-grid">
            <div class="val-btn" onclick="ask('${c}',200,this)">200</div>
            <div class="val-btn" onclick="ask('${c}',400,this)">400</div>
            <div class="val-btn" onclick="ask('${c}',600,this)">600</div>
        </div>`;
        b.appendChild(r);
    });
}

function ask(c, v, el) {
    el.classList.add('used'); curV = v;
    document.getElementById('qBox').style.display = 'flex';
    document.getElementById('qTxt').innerText = data[c][v][0];
    document.getElementById('aTxt').innerText = data[c][v][1];
    document.getElementById('aTxt').style.display = 'none';
    document.getElementById('showA').style.display = 'block';
    document.getElementById('ctrls').style.display = 'none';
    startClock();
}

function startClock() {
    timeElapsed = 0; 
    document.getElementById('clock').innerText = timeElapsed;
    clearInterval(clock);
    clock = setInterval(() => {
        timeElapsed++; 
        document.getElementById('clock').innerText = timeElapsed;
    }, 1000);
}

function reveal() {
    clearInterval(clock);
    document.getElementById('aTxt').style.display = 'block';
    document.getElementById('showA').style.display = 'none';
    document.getElementById('ctrls').style.display = 'flex';
}

function addPts(f) {
    sc[f-1] += curV;
    document.getElementById('p1').innerText = sc[0];
    document.getElementById('p2').innerText = sc[1];
    trn = trn === 1 ? 2 : 1;
    document.getElementById('turn').innerText = "دور فريق " + trn;
    closeQ();
}

function closeQ() { document.getElementById('qBox').style.display = 'none'; }
</script>
</body>
</html>
