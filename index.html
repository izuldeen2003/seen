<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الـ 40 - نسخة الرياضة وباب الحارة</title>
    <style>
        :root { --accent: #ffae00; --dark-bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: var(--text); margin: 0; text-align: center; overflow: hidden; }
        .setup-screen { padding: 20px; height: 100vh; overflow-y: auto; }
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; max-width: 1000px; margin: 20px auto; }
        .cat-btn { background: var(--card-bg); border: 1px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .cat-btn.selected { border-color: var(--accent); background: #332b00; box-shadow: 0 0 10px var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; margin: 20px 0; font-weight: bold; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .game-area { display: grid; gap: 15px; padding: 15px; height: calc(100vh - 70px); overflow-y: auto; }
        .cat-row { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #333; }
        .cat-name { color: var(--accent); font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        .val-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .val-btn { background: #333; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 5px; cursor: pointer; color: #fff; }
        .val-btn.used { opacity: 0; pointer-events: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; z-index: 1000; }
        .timer { font-size: 4rem; color: #00ff88; font-weight: bold; margin-bottom: 20px; }
        .question { font-size: 1.8rem; line-height: 1.4; margin-bottom: 30px; }
        .answer { font-size: 1.6rem; color: #00ff88; border: 2px dashed #00ff88; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: none; }
        .score-btns { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .score-btn { flex: 1; padding: 15px; border-radius: 5px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="setup" class="setup-screen">
    <h1 style="color:var(--accent)">🏆 تحدي الـ 40 - نسخة الرياضة والنخبة</h1>
    <p>اختر 6 فئات لبدء المواجهة:</p>
    <div id="cats" class="cat-grid"></div>
    <button id="start" class="btn-main" style="display:none" onclick="initGame()">ابدأ التحدي</button>
</div>

<div id="game" style="display:none">
    <div class="header">
        <div style="color:#00ff88">فريق 1: <span id="p1">0</span></div>
        <div id="turn" style="color:var(--accent)">دور فريق 1</div>
        <div style="color:#00ff88">فريق 2: <span id="p2">0</span></div>
    </div>
    <div id="board" class="game-area"></div>
</div>

<div id="qBox" class="modal">
    <div id="clock" class="timer">0</div>
    <div id="qTxt" class="question"></div>
    <div id="aTxt" class="answer"></div>
    <button id="showA" class="btn-main" onclick="reveal()">كشف الإجابة</button>
    <div id="ctrls" class="score-btns" style="display:none">
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(1)">صح ف1</button>
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(2)">صح ف2</button>
        <button class="score-btn" style="background:#c62828" onclick="closeQ()">خطأ</button>
    </div>
</div>

<script>
const data = {
    "باب الحارة (النخبة)": {

        400: ["ما اسم الزوجة الثانية لـ 'أبو عصام' التي ظهرت في الجزء السادس وأثارت جدلاً؟", "ناديا (الممرضة الفرنسية)"],
        600: ["من هو الشخص الذي قتل 'صطيف الأعمى' وكيف تم كشفه؟", "أبو عصام، بعد أن رآه يفتح عينيه عند البئر"]
    },
    "رياضة (كرة قدم)": {
        200: ["من هو اللاعب الوحيد الذي فاز بكأس العالم 3 مرات كلاعب؟", "بيليه"],
        400: ["ما هو النادي الذي فاز بأول نسخة من دوري أبطال أوروبا عام 1956؟", "ريال مدريد"],
        600: ["من هو اللاعب صاحب أسرع هدف في تاريخ كأس العالم؟", "هاكان شوكور (بعد 11 ثانية)"]
    },
    "رياضة (متنوعة)": {
        200: ["كم عدد لاعبي فريق كرة السلة داخل الملعب؟", "5 لاعبين"],
        400: ["في أي مدينة أقيمت أول دورة ألعاب أولمبية حديثة عام 1896؟", "أثينا (اليونان)"],
        600: ["ما هو الاسم الذي يطلق على تسجيل 3 نقاط في جولة واحدة في لعبة الغولف؟", "ألبراتوس (Albatross)"]
    },
    "تاريخ إسلامي": {200:["من هو القائد الذي فتح بلاد السند؟","محمد بن القاسم الثقفي"], 400:["في أي عام هجري وقعت غزوة الخندق؟","5 هـ"], 600:["من هو الخليفة الذي أنشأ أول أسطول بحري إسلامي؟","عثمان بن عفان"]},
    "فيزياء": {200:["ما هو الجسيم ذو الشحنة الموجبة في الذرة؟","البروتون"], 400:["من هو العالم الذي اكتشف قانون الجاذبية؟","إسحاق نيوتن"], 600:["ما هو الاسم العلمي لتحول المادة من الحالة الغازية إلى السائلة؟","التكاثف"]},
    "كيمياء": {200:["ما هو الرمز الكيميائي للذهب؟","Au"], 400:["ما هو الغاز الذي يمتص الأشعة فوق البنفسجية في الجو؟","الأوزون"], 600:["ما هو ترتيب عنصر الهيدروجين في الجدول الدوري؟","الأول"]},
    "عواصم": {200:["ما هي عاصمة اليابان؟","طوكيو"], 400:["ما هي عاصمة أستراليا؟","كانبيرا"], 600:["ما هي عاصمة السنغال؟","داكار"]},
    "أدب عربي": {200:["من هو الشاعر الملقب بـ 'شاعر النيل'؟","حافظ إبراهيم"], 400:["من هو مؤلف رواية 'عزازيل'؟","يوسف زيدان"], 600:["من هو الشاعر الذي قتله بيته 'الخيل والليل والبيداء تعرفني'؟","المتنبي"]},
    "جغرافيا": {200:["ما هو أكبر بحر مغلق في العالم؟","بحر قزوين"], 400:["ما هي الدولة التي تمتلك أكبر عدد من الجزر؟","السويد"], 600:["ما هو النهر الذي يمر بـ 10 دول أوروبية؟","نهر الدانوب"]},
    "طب": {200:["ما هو أقوى عظم في جسم الإنسان؟","عظم الفخذ"], 400:["ما هو الفيتامين المسؤول عن تخثر الدم؟","فيتامين K"], 600:["أين يتم إنتاج خلايا الدم الحمراء؟","نخاع العظم"]},
    "فضاء": {200:["ما هو الكوكب الملقب بـ 'توأم الأرض'؟","الزهرة"], 400:["ما هو اسم أول قمر صناعي أطلق للفضاء؟","سبوتنيك 1"], 600:["ما هي المادة التي تشكل معظم كتلة الشمس؟","الهيدروجين"]},
    "اختراعات": {200:["من اخترع المصباح الكهربائي؟","إديسون"], 400:["من اخترع الراديو؟","ماركوني"], 600:["من اخترع لغة البرمجة C؟","دينيس ريتشي"]},
    "تقنية": {200:["ماذا يرمز اختصار Wi-Fi؟","Wireless Fidelity"], 400:["ما هي الشركة التي طورت نظام أندرويد؟","جوجل (بعد الاستحواذ على شركة أندرويد)"], 600:["ماذا يرمز اختصار HTTP؟","Hypertext Transfer Protocol"]},
    "حيوانات": {200:["ما هو الحيوان الذي لا يمتلك صوتاً (أحبال صوتية)؟","الزرافة"], 400:["ما هو الطائر الذي يضع أكبر بيضة؟","النعامة"], 600:["كم عدد قلوب الأخطبوط؟","3 قلوب"]},
    "نباتات": {200:["ما هي المادة التي تعطي النبات لونه الأخضر؟","الكلوروفيل"], 400:["ما هي الشجرة التي تعتبر رمزاً للسلام؟","الزيتون"], 600:["ما هو النبات الذي يستخرج منه الأسبرين؟","الصفصاف"]},
    "رياضيات": {200:["ما هو مجموع زوايا المثلث؟","180 درجة"], 400:["ما هو الرقم الذي يمثل 'باي' (Pi)؟","3.14"], 600:["ما هو العدد الأولي الذي يلي الرقم 13؟","17"]},
    "سيارات": {200:["ما هي الدولة المصنعة لسيارات بي إم دبليو؟","ألمانيا"], 400:["ما هو شعار شركة فيراري؟","الحصان الجامح"], 600:["ما هي أول سيارة تم إنتاجها بكميات ضخمة في التاريخ؟","فورد موديل T"]},
    "أفلام": {200:["ما هو الفيلم الذي فاز بأكبر عدد من الأوسكار؟","تايتانيك (11 جائزة)"], 400:["من هو مخرج فيلم 'الأب الروحي'؟","فرانسيس فورد كوبولا"], 600:["من هو الممثل الذي جسد شخصية غاندي في فيلمه الشهير؟","بين كينغسلي"]},
    "سينما عربية": {200:["من هو الملقب بـ 'عمدة السينما المصرية'؟","صلاح ذو الفقار (أو صلاح السعدني في الدراما)"], 400:["ما هو أول فيلم مصري صامت؟","ليلى (1927)"], 600:["من هو المخرج السوري الذي أخرج فيلم 'الرسالة'؟","مصطفى العقاد"]},
    "أساطير": {200:["من هو إله الرعد عند اليونان؟","زيوس"], 400:["ما هو اسم الحصان الأسطوري المجنح؟","بيغاسوس"], 600:["ما هي 'ميدوسا' في الأساطير؟","امرأة شعرها أفاعي وتحول من يراها لحجر"]},
    "منطق": {200:["شيء كلما زاد نقص؟","العمر"], 400:["له عين واحدة ولا يرى؟","الإبرة"], 600:["يمشي بلا أرجل ويبكي بلا عينين؟","السحاب"]},
    "عجائب": {200:["أين تقع الأهرامات؟","مصر"], 400:["من بنى تاج محل؟","شاه جهان"], 600:["ما هي العجيبة الوحيدة الباقية من العجائب السبع القديمة؟","هرم خوفو"]},
    "لغات": {200:["ما هي اللغة الأم في البرازيل؟","البرتغالية"], 400:["ما هي اللغة التي تسمى لغة الضاد؟","العربية"], 600:["ما هي اللغة الرسمية في الفاتيكان؟","اللاتينية"]},
    "بحار": {200:["ما هو أملح بحر في العالم؟","البحر الميت"], 400:["ما هو المضيق الذي يربط البحر المتوسط بالمحيط الأطلسي؟","جبل طارق"], 600:["ما هو أعمق خندق في المحيطات؟","ماريانا"]},
    "طيور": {200:["ما هو أصغر طائر في العالم؟","الطنان"], 400:["ما هو الطائر الذي يرى في الليل؟","البومة"], 600:["طائر يلقب بـ 'الجمل الطائر'؟","النعامة"]},
    "برمجيات": {200:["ما هي لغة البرمجة المستخدمة في آيفون؟","Swift"], 400:["من هو مؤسس فيسبوك؟","مارك زوكربيرج"], 600:["ماذا يعني اختصار SQL؟","Structured Query Language"]},
    "اقتصاد": {200:["ما هي العملة الرسمية في الصين؟","اليوان"], 400:["ماذا يعني مصطلح 'تضخم'؟","ارتفاع الأسعار وانخفاض قيمة العملة"], 600:["أين يقع مقر البنك الدولي؟","واشنطن"]},
    "نفس": {200:["ما هو تعريف الفوبيا؟","خوف مرضي"], 400:["من هو مؤسس علم النفس التحليلي؟","فرويد"], 600:["ما هي النرجسية؟","حب الذات المفرط"]},
    "فلسفة": {200:["من قال 'أنا أفكر إذن أنا موجود'؟","رينيه ديكارت"], 400:["من هو تلميذ سقراط؟","أفلاطون"], 600:["ما هي الوجودية؟","فلسفة تركز على وجود الفرد وحريته"]},
    "أمثال": {200:["أكمل: على نفسها جنت...؟","براقش"], 400:["وافق شن...؟","طبقة"], 600:["ما معنى 'رجع بخفي حنين'؟","عاد بالخيبة"]},
    "ساعات": {200:["كم ثانية في الساعة؟","3600"], 400:["أين تقع ساعة مكة؟","مكة المكرمة"], 600:["من اخترع الساعة الرملية؟","الإغريق (أو الرومان)"]},
    "بناء": {200:["من صمم برج إيفل؟","غوستاف إيفل"], 400:["ما هو أطول سور في العالم؟","سور الصين العظيم"], 600:["أين يقع برج بيزا المائل؟","إيطاليا"]},
    "طيور جارحة": {200:["ما هو أسرع صقر؟","الشاهين"], 400:["ما هو لقب النسر؟","ملك الطيور"], 600:["كم تبلغ قوة بصر الصقر مقارنة بالإنسان؟","8 أضعاف"]},
    "كيمياء حيوية": {200:["ما هو سكر الفواكه؟","الفركتوز"], 400:["ما هو هرمون السعادة؟","السيروتونين"], 600:["ما هو الإنزيم الهاضم للبروتين؟","البيبسين"]},
    "أرقام قياسية": {200:["ما هي أعلى قمة في العالم؟","إيفرست"], 400:["ما هي أكبر جزيرة في العالم؟","غرينلاند"], 600:["ما هي الدولة الأكثر سكاناً حالياً؟","الهند"]},
    "تراث": {200:["ما هي الرقصة الشعبية في الخليج؟","العرضة"], 400:["ما هي الدبكة؟","رقصة شعبية في الشام"], 600:["ما هو 'الكيمونو'؟","زي ياباني تقليدي"]},
    "ألعاب كرتون": {200:["من هو صديق سبونج بوب؟","بسيط"], 400:["ما اسم القرية في السنافر؟","قرية السنافر"], 600:["من هو مخترع ميكي ماوس؟","والت ديزني"]},
    "فنون": {200:["من رسم الموناليزا؟","دافنشي"], 400:["من رسم 'الصرخة'؟","إدوارد مونك"], 600:["ما هي التكعيبية؟","مدرسة فنية أسسها بيكاسو"]},
    "حقائق": {200:["كم عدد عظام الإنسان البالغ؟","206"], 400:["ما هو لون دم السلطعون؟","أزرق"], 600:["العضو الذي لا ينمو منذ الولادة؟","العين (العدسة)"]},
    "حضارات قديمة": {200:["ما هي حضارة الرافدين؟","العراق القديم"], 400:["من هم بناة البتراء؟","الأنباط"], 600:["ما هي عاصمة الفينيقيين؟","صور (أو صيدون)"]}
};

let selected = [], sc = [0, 0], trn = 1, curV = 0, clock, timeElapsed = 0;

const grid = document.getElementById('cats');
Object.keys(data).forEach(c => {
    let d = document.createElement('div');
    d.className = 'cat-btn'; d.innerText = c;
    d.onclick = () => {
        if(d.classList.contains('selected')) {
            d.classList.remove('selected'); selected = selected.filter(x => x !== c);
        } else if(selected.length < 6) {
            d.classList.add('selected'); selected.push(c);
        }
        document.getElementById('start').style.display = selected.length === 6 ? 'inline-block' : 'none';
    };
    grid.appendChild(d);
});

function initGame() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    const b = document.getElementById('board');
    selected.forEach(c => {
        let r = document.createElement('div');
        r.className = 'cat-row';
        r.innerHTML = `<div class="cat-name">${c}</div><div class="val-grid">
            <div class="val-btn" onclick="ask('${c}',200,this)">200</div>
            <div class="val-btn" onclick="ask('${c}',400,this)">400</div>
            <div class="val-btn" onclick="ask('${c}',600,this)">600</div>
        </div>`;
        b.appendChild(r);
    });
}

function ask(c, v, el) {
    el.classList.add('used'); curV = v;
    document.getElementById('qBox').style.display = 'flex';
    document.getElementById('qTxt').innerText = data[c][v][0];
    document.getElementById('aTxt').innerText = data[c][v][1];
    document.getElementById('aTxt').style.display = 'none';
    document.getElementById('showA').style.display = 'block';
    document.getElementById('ctrls').style.display = 'none';
    startClock();
}

function startClock() {
    timeElapsed = 0; 
    document.getElementById('clock').innerText = timeElapsed;
    clearInterval(clock);
    clock = setInterval(() => {
        timeElapsed++; 
        document.getElementById('clock').innerText = timeElapsed;
    }, 1000);
}

function reveal() {
    clearInterval(clock);
    document.getElementById('aTxt').style.display = 'block';
    document.getElementById('showA').style.display = 'none';
    document.getElementById('ctrls').style.display = 'flex';
}

function addPts(f) {
    sc[f-1] += curV;
    document.getElementById('p1').innerText = sc[0];
    document.getElementById('p2').innerText = sc[1];
    trn = trn === 1 ? 2 : 1;
    document.getElementById('turn').innerText = "دور فريق " + trn;
    closeQ();
}

function closeQ() { document.getElementById('qBox').style.display = 'none'; }
</script>
</body>
</html>
