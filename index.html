<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الـ 40 - حزمة الأسئلة الجديدة</title>
    <style>
        :root { --accent: #ffae00; --dark-bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: var(--text); margin: 0; text-align: center; overflow: hidden; }
        .setup-screen { padding: 20px; height: 100vh; overflow-y: auto; }
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; max-width: 1000px; margin: 20px auto; }
        .cat-btn { background: var(--card-bg); border: 1px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .cat-btn.selected { border-color: var(--accent); background: #332b00; box-shadow: 0 0 10px var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; margin: 20px 0; font-weight: bold; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .game-area { display: grid; gap: 15px; padding: 15px; height: calc(100vh - 70px); overflow-y: auto; }
        .cat-row { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #333; }
        .cat-name { color: var(--accent); font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        .val-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .val-btn { background: #333; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 5px; cursor: pointer; color: #fff; }
        .val-btn.used { opacity: 0; pointer-events: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; z-index: 1000; }
        .timer { font-size: 4rem; color: #00ff88; font-weight: bold; margin-bottom: 20px; }
        .question { font-size: 1.8rem; line-height: 1.4; margin-bottom: 30px; }
        .answer { font-size: 1.6rem; color: #00ff88; border: 2px dashed #00ff88; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: none; }
        .score-btns { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .score-btn { flex: 1; padding: 15px; border-radius: 5px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="setup" class="setup-screen">
    <h1 style="color:var(--accent)">🏆 تحدي الـ 40 - نسخة الأسئلة الجديدة</h1>
    <p>اختر 6 فئات مختلفة لبدء اللعب:</p>
    <div id="cats" class="cat-grid"></div>
    <button id="start" class="btn-main" style="display:none" onclick="initGame()">بدأ المواجهة</button>
</div>

<div id="game" style="display:none">
    <div class="header">
        <div style="color:#00ff88">فريق 1: <span id="p1">0</span></div>
        <div id="turn" style="color:var(--accent)">دور فريق 1</div>
        <div style="color:#00ff88">فريق 2: <span id="p2">0</span></div>
    </div>
    <div id="board" class="game-area"></div>
</div>

<div id="qBox" class="modal">
    <div id="clock" class="timer">0</div>
    <div id="qTxt" class="question"></div>
    <div id="aTxt" class="answer"></div>
    <button id="showA" class="btn-main" onclick="reveal()">إظهار الإجابة</button>
    <div id="ctrls" class="score-btns" style="display:none">
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(1)">صح ف1</button>
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(2)">صح ف2</button>
        <button class="score-btn" style="background:#c62828" onclick="closeQ()">خطأ</button>
    </div>
</div>

<script>
const data = {
    "غزوة بدر": {200:["ما هو اسم البئر الذي نزل عنده المسلمون قبل المعركة؟","بئر بدر"], 400:["من هو الصحابي الذي قتل أمية بن خلف في معركة بدر؟","بلال بن رباح"], 600:["كم كان عدد شهداء المسلمين في غزوة بدر؟","14 شهيداً"]},
    "تاريخ الأنبياء": {200:["من هو النبي الذي صام عن الكلام لمدة ثلاثة أيام؟","زكريا عليه السلام"], 400:["نبي ذكر في القرآن الكريم أنه 'أواب' فمن هو؟","داوود عليه السلام (أو سليمان)"], 600:["من هو النبي الذي حبسه ملك مأرب في بئر؟","إدريس عليه السلام (في بعض الروايات)"]},
    "أدب جاهلي": {200:["من هو الشاعر الملقب بـ 'الملك الضليل'؟","امرؤ القيس"], 400:["ما هو الاسم الذي يطلق على القصائد السبع الطوال؟","المعلقات"], 600:["من هو الشاعر الذي قتلته قصيدته في مدح كليب؟","المهلهل (الزير سالم)"]},
    "حضارات قديمة": {200:["ما هي الحضارة التي ابتكرت الأبجدية الأولى في التاريخ؟","الفينيقية"], 400:["ما هو الاسم القديم لمدينة 'القسطنطينية' قبل هذا الاسم؟","بيزنطة"], 600:["من هو الملك البابلي صاحب أول شريعة قانونية مكتوبة؟","حمورابي"]},
    "فيزياء ذرية": {200:["ما هو الجسيم ذو الشحنة المتعادلة داخل النواة؟","النيوترون"], 400:["ما هو الاسم الذي يطلق على تحول المادة من الحالة الصلبة للغازية مباشرة؟","التسامي"], 600:["من هو العالم الذي اكتشف 'مبدأ الطفو'؟","أرشميدس"]},
    "كيمياء عضوية": {200:["ما هو الغاز الذي يسمى 'غاز المستنقعات'؟","الميثان"], 400:["ما هو المركب الكيميائي الأساسي في الخل؟","حمض الأسيتيك (الخليك)"], 600:["ما هو العنصر الذي يعتبر المكون الرئيسي لجميع المركبات العضوية؟","الكربون"]},
    "رياضيات": {200:["ما هو قياس الزاوية القائمة؟","90 درجة"], 400:["من هو صاحب نظرية المثلث قائم الزاوية؟","فيثاغورس"], 600:["ما هو العدد الذي إذا ضربته في نفسه وأضفت إليه 5 كان الناتج 30؟","5"]},
    "فلك": {200:["ما هو أبعد كوكب عن الشمس؟","نبتون"], 400:["ما اسم المجرة التي نعيش فيها؟","درب التبانة"], 600:["كم يستغرق دوران الأرض حول نفسها بدقة (بالساعات والدقائق)؟","23 ساعة و56 دقيقة"]},
    "جغرافيا": {200:["ما هي أكبر دولة في العالم مساحة؟","روسيا"], 400:["ما هو أعمق منخفض في اليابسة؟","منخفض البحر الميت"], 600:["ما هي الدولة التي تمتلك أكبر عدد من البراكين النشطة؟","إندونيسيا"]},
    "أحياء": {200:["ما هي الوحدة الأساسية في بناء الكائن الحي؟","الخلية"], 400:["كم عدد عظام جسم الإنسان البالغ؟","206 عظمة"], 600:["ما هو العضو الذي يستهلك 20% من أكسجين الجسم؟","الدماغ"]},
    "تقنية": {200:["ماذا يرمز اختصار HTTP؟","بروتوكول نقل النص الفائق"], 400:["ما هي أول شركة تقنية وصلت قيمتها السوقية لـ 3 تريليون دولار؟","آبل"], 600:["ما هو الاسم الحقيقي لمبتكر البيتكوين المستعار؟","ساتوشي ناكاموتو"]},
    "ألعاب فيديو": {200:["ما هي اللعبة الأكثر مبيعاً في التاريخ؟","ماين كرافت"], 400:["ما هو اسم الشخصية الرئيسية في سلسلة ألعاب زيلدا؟","لينك (Link)"], 600:["في أي عام صدر جهاز 'بلايستيشن 1' لأول مرة في اليابان؟","1994"]},
    "سينما": {200:["ما هو الفيلم الذي يحمل لقب 'الأكثر تحقيقاً للأرباح' تاريخياً؟","أفاتار"], 400:["من هو الممثل الذي جسد شخصية 'الجوكر' في فيلم Dark Knight؟","هيث ليدجر"], 600:["ما هي الجائزة السينمائية الأرفع في مهرجان كان؟","السعفة الذهبية"]},
    "طب": {200:["ما هو المعدل الطبيعي لضغط الدم للإنسان؟","120/80"], 400:["ما هي المادة التي تعطي الجلد والشعر لونهما؟","الميلانين"], 600:["ما هو المرض الذي يسمى 'القاتل الصامت'؟","ارتفاع ضغط الدم"]},
    "تاريخ إسلامي": {200:["من هو القائد الذي فتح بلاد الأندلس؟","طارق بن زياد"], 400:["في أي معركة انتهى وجود الدولة الأموية؟","معركة الزاب"], 600:["من هو الخليفة الذي بنى مدينة 'سامراء'؟","المعتصم بالله"]},
    "أساطير": {200:["ما هو طائر الفينيق؟","طائر أسطوري يولد من رماده"], 400:["من هو إله الشمس عند المصريين القدماء؟","رع"], 600:["ما اسم السيف الأسطوري للملك آرثر؟","إكسكاليبر"]},
    "لغات": {200:["ما هي اللغة الأم لأكبر عدد من البشر؟","الصينية (الماندرين)"], 400:["ما هي اللغة التي تسمى 'لغة الضاد'؟","العربية"], 600:["ما هي لغة الفاتيكان الرسمية؟","اللاتينية"]},
    "دول وعواصم": {200:["ما هي عاصمة كوريا الجنوبية؟","سول"], 400:["ما هي عاصمة البرتغال؟","لشبونة"], 600:["ما هي عاصمة كازاخستان الحالية؟","أستانا (نور سلطان سابقاً)"]},
    "رياضة": {200:["من هو الهداف التاريخي لكأس العالم؟","ميروسلاف كلوزه"], 400:["كم عدد لاعبي فريق البيسبول؟","9 لاعبين"], 600:["في أي عام أقيمت أول دورة ألعاب أولمبية حديثة؟","1896"]},
    "اختراعات": {200:["من اخترع المحرك البخاري؟","جيمس واط"], 400:["من اخترع البطارية الكهربائية؟","أليساندرو فولتا"], 600:["من اخترع لغة البرمجة 'سي' (C)؟","دينيس ريتشي"]},
    "فضاء": {200:["ما هو أول كائن حي صعد إلى الفضاء؟","الكلبة لايكا"], 400:["ما هو الكوكب الملقب بـ 'توأم الأرض'؟","الزهرة"], 600:["ما هو الثقب الأسود 'سجيتاريوس A'؟","الثقب الأسود في مركز مجرتنا"]},
    "كيمياء": {200:["ما هو الرمز الكيميائي للفضة؟","Ag"], 400:["ما هو الرقم الهيدروجيني (pH) للماء النقي؟","7"], 600:["ما هو الغاز الذي يشكل النسبة الأكبر من الغلاف الجوي للمريخ؟","ثاني أكسيد الكربون"]},
    "فيزياء": {200:["ما هي وحدة قياس التردد؟","الهيرتز"], 400:["ما هو قانون نيوتن الثاني؟","القوة تساوي الكتلة في التسارع"], 600:["ما هي سرعة الصوت في الهواء التقريبية؟","343 متر/ثانية"]},
    "عجائب": {200:["أين تقع منارة الإسكندرية القديمة؟","مصر"], 400:["من بنى حدائق بابل المعلقة؟","نبوزنصر الثاني"], 600:["ما هي العجيبة الوحيدة الباقية من العجائب السبع القديمة؟","هرم خوفو"]},
    "حيوانات": {200:["ما هو أثقل حيوان على وجه الأرض؟","الحوت الأزرق"], 400:["ما هو الحيوان الذي يمكنه تغيير لونه للتمويه؟","الحرباء"], 600:["ما هو الطائر الذي يضع أكبر بيضة في العالم؟","النعامة"]},
    "نباتات": {200:["ما هي المادة الخضراء في النبات؟","الكلوروفيل"], 400:["ما هي الشجرة التي تستخرج منها مادة المطاط؟","شجرة الهيفيا"], 600:["ما هي الزهرة التي تتبع حركة الشمس؟","تباع الشمس"]},
    "شركات": {200:["ما هي الشركة التي صنعت محرك البحث 'جوجل'؟","ألفابت"], 400:["ما هي جنسية شركة 'سامسونج'؟","كورية جنوبية"], 600:["من هو مؤسس شركة 'أمازون'؟","جيف بيزوس"]},
    "اقتصاد": {200:["ما هي العملة الرسمية لليابان؟","الين"], 400:["ماذا يعني مصطلح 'تضخم' في الاقتصاد؟","ارتفاع مستمر في أسعار السلع"], 600:["أين يقع مقر البنك الدولي؟","واشنطن"]},
    "نفس": {200:["ما هو تعريف 'الفوبيا'؟","خوف شديد وغير مبرر"], 400:["من هو مؤسس علم النفس التحليلي؟","سيجموند فرويد"], 600:["ما هو 'ذكاء عاطفي'؟","القدرة على فهم وإدارة العواطف"]},
    "فلسفة": {200:["من هو الفيلسوف الذي قال 'أنا أفكر إذن أنا موجود'؟","رينيه ديكارت"], 400:["ما هو مذهب 'الرواقية'؟","التحكم في النفس والهدوء أمام الصعاب"], 600:["من هو تلميذ سقراط وأستاذ أرسطو؟","أفلاطون"]},
    "تراث": {200:["ما هو الزي الشعبي للرجال في اسكتلندا؟","الكيـلت (الإزار)"], 400:["ما هي الآلة الموسيقية الخشبية التي تشبه الناي وتشتهر في تركيا؟","الناي"], 600:["ما هو فن 'القـط العسيري'؟","فن زخرفة الجدران في السعودية"]},
    "سيارات": {200:["ما هي الدولة المصنعة لسيارات 'فيراري'؟","إيطاليا"], 400:["ما هو شعار شركة 'تويوتا'؟","ثلاث حلقات متداخلة"], 600:["ما هي أول سيارة تم إنتاجها بكميات ضخمة؟","فورد موديل T"]},
    "أرقام": {200:["ما هو مجموع زوايا المثلث؟","180 درجة"], 400:["ما هو العدد الأولي الوحيد الزوجي؟","2"], 600:["كم يساوي المليار (كم صفر)؟","9 أصفار"]},
    "إسلاميات": {200:["ما هو أطول يوم في حياة النبي ﷺ؟","يوم خيبر (أو فتح مكة في بعض الأقوال)"], 400:["كم عدد أجزاء القرآن الكريم؟","30 جزءاً"], 600:["ما هي السورة التي تنتهي بكلمة 'المعون'؟","سورة الماعون"]},
    "طيور": {200:["ما هو الطائر الذي يلقب بـ 'الهدهد'؟","طائر الهدهد"], 400:["ما هو الطائر الذي لا يطير ويعيش في القطب الجنوبي؟","البطريق"], 600:["ما هو أصغر طائر في العالم؟","الطنان"]},
    "ساعات": {200:["كم دقيقة في 3 ساعات؟","180 دقيقة"], 400:["من اخترع الساعة الميكانيكية؟","بيتر هينلاين"], 600:["ما هو خط التوقيت العالمي؟","خط غرينتش"]},
    "بحار": {200:["ما هو أكبر بحر مغلق في العالم؟","بحر قزوين"], 400:["ما هو المضيق الذي يربط البحر المتوسط بالمحيط الأطلسي؟","جبل طارق"], 600:["ما هو اسم التيار المائي الدافئ الذي يؤثر على مناخ أوروبا؟","تيار الخليج"]},
    "بناء": {200:["من بنى الأهرامات الثلاثة في الجيزة؟","خوفو، خفرع، منقرع"], 400:["ما هو أطول سور بناه الإنسان؟","سور الصين العظيم"], 600:["ما هو البرج المائل الشهير في إيطاليا؟","برج بيزا"]},
    "منطق": {200:["شيء كلما زاد نقص؟","العمر"], 400:["له عين واحدة ولا يرى؟","الإبرة"], 600:["ابن أمك وأبوك وليس أخوك؟","أنت"]},
    "أمثال": {200:["أكمل المثل: 'على نفسها جنت...'؟","براقش"], 400:["ما هو المثل الذي يضرب للشخص الذي يعود بخيبة أمل؟","رجع بخفي حنين"], 600:["ما معنى 'وافق شن طبقة'؟","الانسجام بين شخصين متشابهين"]}
};

let selected = [], sc = [0, 0], trn = 1, curV = 0, clock, timeElapsed = 0;

const grid = document.getElementById('cats');
Object.keys(data).forEach(c => {
    let d = document.createElement('div');
    d.className = 'cat-btn'; d.innerText = c;
    d.onclick = () => {
        if(d.classList.contains('selected')) {
            d.classList.remove('selected'); selected = selected.filter(x => x !== c);
        } else if(selected.length < 6) {
            d.classList.add('selected'); selected.push(c);
        }
        document.getElementById('start').style.display = selected.length === 6 ? 'inline-block' : 'none';
    };
    grid.appendChild(d);
});

function initGame() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    const b = document.getElementById('board');
    selected.forEach(c => {
        let r = document.createElement('div');
        r.className = 'cat-row';
        r.innerHTML = `<div class="cat-name">${c}</div><div class="val-grid">
            <div class="val-btn" onclick="ask('${c}',200,this)">200</div>
            <div class="val-btn" onclick="ask('${c}',400,this)">400</div>
            <div class="val-btn" onclick="ask('${c}',600,this)">600</div>
        </div>`;
        b.appendChild(r);
    });
}

function ask(c, v, el) {
    el.classList.add('used'); curV = v;
    document.getElementById('qBox').style.display = 'flex';
    document.getElementById('qTxt').innerText = data[c][v][0];
    document.getElementById('aTxt').innerText = data[c][v][1];
    document.getElementById('aTxt').style.display = 'none';
    document.getElementById('showA').style.display = 'block';
    document.getElementById('ctrls').style.display = 'none';
    startClock();
}

function startClock() {
    timeElapsed = 0; 
    document.getElementById('clock').innerText = timeElapsed;
    clearInterval(clock);
    clock = setInterval(() => {
        timeElapsed++; 
        document.getElementById('clock').innerText = timeElapsed;
    }, 1000);
}

function reveal() {
    clearInterval(clock);
    document.getElementById('aTxt').style.display = 'block';
    document.getElementById('showA').style.display = 'none';
    document.getElementById('ctrls').style.display = 'flex';
}

function addPts(f) {
    sc[f-1] += curV;
    document.getElementById('p1').innerText = sc[0];
    document.getElementById('p2').innerText = sc[1];
    trn = trn === 1 ? 2 : 1;
    document.getElementById('turn').innerText = "دور فريق " + trn;
    closeQ();
}

function closeQ() { document.getElementById('qBox').style.display = 'none'; }
</script>
</body>
</html>
