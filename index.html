<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الـ 40 - نسخة الرياضة والنخبة المحدثة</title>
    <style>
        :root { --accent: #ffae00; --dark-bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: var(--text); margin: 0; text-align: center; overflow: hidden; }
        .setup-screen { padding: 20px; height: 100vh; overflow-y: auto; }
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; max-width: 1000px; margin: 20px auto; }
        .cat-btn { background: var(--card-bg); border: 1px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .cat-btn.selected { border-color: var(--accent); background: #332b00; box-shadow: 0 0 10px var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; margin: 20px 0; font-weight: bold; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .game-area { display: grid; gap: 15px; padding: 15px; height: calc(100vh - 70px); overflow-y: auto; }
        .cat-row { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #333; }
        .cat-name { color: var(--accent); font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        .val-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .val-btn { background: #333; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 5px; cursor: pointer; color: #fff; }
        .val-btn.used { opacity: 0; pointer-events: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; z-index: 1000; }
        .timer { font-size: 4rem; color: #00ff88; font-weight: bold; margin-bottom: 20px; }
        .question { font-size: 1.8rem; line-height: 1.4; margin-bottom: 30px; }
        .answer { font-size: 1.6rem; color: #00ff88; border: 2px dashed #00ff88; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: none; }
        .score-btns { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .score-btn { flex: 1; padding: 15px; border-radius: 5px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="setup" class="setup-screen">
    <h1 style="color:var(--accent)">🏆 تحدي الـ 40 - النسخة الرياضية الشاملة</h1>
    <p>اختر 6 فئات لبدء التحدي:</p>
    <div id="cats" class="cat-grid"></div>
    <button id="start" class="btn-main" style="display:none" onclick="initGame()">ابدأ التحدي</button>
</div>

<div id="game" style="display:none">
    <div class="header">
        <div style="color:#00ff88">فريق 1: <span id="p1">0</span></div>
        <div id="turn" style="color:var(--accent)">دور فريق 1</div>
        <div style="color:#00ff88">فريق 2: <span id="p2">0</span></div>
    </div>
    <div id="board" class="game-area"></div>
</div>

<div id="qBox" class="modal">
    <div id="clock" class="timer">0</div>
    <div id="qTxt" class="question"></div>
    <div id="aTxt" class="answer"></div>
    <button id="showA" class="btn-main" onclick="reveal()">كشف الإجابة</button>
    <div id="ctrls" class="score-btns" style="display:none">
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(1)">صح ف1</button>
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(2)">صح ف2</button>
        <button class="score-btn" style="background:#c62828" onclick="closeQ()">خطأ</button>
    </div>
</div>

<script>
const data = {

        600: ["من هي الشخصية التي قامت بدور الحكيم بعد وفاة 'أبو عصام' في الأجزاء التي غاب فيها؟", "أبو حاتم (بشكل مؤقت كمسؤول) ثم الطبيب حمزة"]

    "رياضة (أرقام)": {

        400: ["من هو الهداف التاريخي لبطولة كأس العالم لكرة القدم؟", "ميروسلاف كلوزه (16 هدفاً)"],
        600: ["كم عدد أشواط مباراة التنس في بطولات الغراند سلام للرجال؟", "بحد أقصى 5 أشواط (الفائز بـ 3)"]

    "أدب عالمي": {200:["من هو مؤلف رواية 'مئة عام من العزلة'؟","غابرييل غارسيا ماركيز"], 400:["من هو صاحب رواية 'الأخوة كارامازوف'؟","دوستويفسكي"], 600:["ما هو الاسم الحقيقي للكاتب 'جورج أورويل'؟","إريك آرثر بلير"]},
    "جغرافيا قاسية": {200:["ما هي أبرد مدينة مأهولة في العالم؟","أويميناكون (روسيا)"], 400:["ما هو أخفض مكان على سطح اليابسة؟","شاطئ البحر الميت"], 600:["ما هي الدولة التي يمر بها أكبر عدد من خطوط الطول؟","فرنسا (بسبب أقاليمها)"]},
    "دماغ الإنسان": {200:["كم نسبة الماء في دماغ الإنسان تقريباً؟","75% إلى 80%"], 400:["ما هو الجزء المسؤول عن تنظيم النوم في الدماغ؟","الغدة الصنوبرية (الميلاتونين)"], 600:["ما هو اسم المادة الرمادية في الدماغ؟","القشرة المخية"]},
    "غزوات": {200:["من هو الصحابي الذي قتل 'أبو جهل'؟","معاذ بن عفراء ومعاذ بن عمرو (أجهز عليه ابن مسعود)"], 400:["في أي غزوة فقد النبي ﷺ ثناياه وشُج رأسه؟","غزوة أحد"], 600:["من هو قائد المشركين في غزوة الأحزاب؟","أبو سفيان بن حرب"]},
    "تقنية قديمة": {200:["من هو مخترع المحرك البخاري؟","جيمس واط"], 400:["في أي عام تم إرسال أول رسالة بريد إلكتروني (Email)؟","1971"], 600:["ما هو اسم أول لغة برمجة عالية المستوى؟","فورتران (Fortran)"]},

    "نباتات طبية": {200:["ما هو النبات الذي يستخرج منه زيت الخروع؟","نبات الخروع"], 400:["نبات يسمى 'الذهب السائل' ويستخدم للشعر والبشرة؟","الأرجان"], 600:["ما هو النبات الذي يستخرج منه مادة المورفين؟","خشخاش الأفيون"]},
    "رياضيات معقدة": {200:["ما هو الرقم الذي يمثله الحرف (X) في الأرقام الرومانية؟","10"], 400:["ما هو مجموع الزوايا الخارجية لأي مضلع؟","360 درجة"], 600:["ما هو العدد الذي يسمى 'العدد النيبيري'؟","e (تقريباً 2.718)"]},
    "ماركات سيارات": {200:["ما معنى كلمة 'فولكس فاجن' بالألمانية؟","سيارة الشعب"], 400:["ما هي الدولة المنشأة لشركة 'سكودا'؟","جمهورية التشيك"], 600:["ما هو اسم الطراز الشهير لشركة بورش الذي يحمل الرقم 911؟","كاريرا"]},
    "سينما هوليوود": {200:["من هو بطل سلسلة أفلام 'إنديانا جونز'؟","هاريـسون فورد"], 400:["من هو المخرج الذي أخرج فيلم 'باراسايت'؟","بونغ جون هو"], 600:["ما هو أول فيلم رسوم متحركة مرشح للأوسكار كأفضل فيلم؟","الجميلة والوحش (1991)"]},
    "ثقافة عامة": {200:["ما هو اللون الذي ينتج عن دمج الأحمر والأزرق؟","البنفسجي"], 400:["ما هي الدولة التي تسمى 'بلاد الرافدين'؟","العراق"], 600:["ما هو اسم عملة دولة فيتنام؟","الدونغ"]},
    "أساطير الشعوب": {200:["من هو إله الموت عند الفراعنة؟","أنوبيس"], 400:["ما هو وحش 'الكراكين' الأسطوري؟","حبار عملاق"], 600:["من هو البطل الإغريقي الذي قام بـ 12 عملاً خارقاً؟","هرقل"]},
    "لغات حية": {200:["ما هي اللغة الأكثر انتشاراً في سويسرا؟","الألمانية"], 400:["ما هي اللغة الرسمية في البرازيل؟","البرتغالية"], 600:["إلى أي عائلة لغوية تنتمي اللغة التركية؟","اللغات الألطية"]},
    "فنون تشكيلية": {200:["من هو صاحب لوحة 'ليلة النجوم'؟","فان جوخ"], 400:["ما هو فن طي الورق الياباني؟","أوريغامي"], 600:["ما هي المدرسة الفنية التي اشتهر بها سلفادور دالي؟","السريالية"]},
    "قارات": {200:["ما هي القارة الوحيدة التي لا توجد فيها براكين؟","أستراليا"], 400:["ما هي أصغر دولة في أفريقيا من حيث المساحة؟","سيشل"], 600:["ما هو اسم القارة العظيمة التي كانت تجمع القارات قديماً؟","بانجيا"]},
    "فضاء بعيد": {200:["ما هو الكوكب الذي يدور حوله 'حلقات' بارزة جداً؟","زحل"], 400:["ما هو أبعد كوكب عن الشمس؟","نبتون"], 600:["ما هو اسم الثقب الأسود الموجود في مركز مجرتنا؟","الرامي أ* (Sagittarius A*)"]},
    "حيوانات مفترسة": {200:["ما هو أقوى فك حيوان في العالم؟","التمساح"], 400:["كم تبلغ سرعة الفهد الصياد (الشيتا) القصوى؟","110-120 كم/س"], 600:["ما هو الحيوان الملقب بـ 'شيطان التسمانيا'؟","جرابي مفترس يعيش في أستراليا"]},
    "برمجة الويب": {200:["ماذا يعني حرف (S) في بروتوكول HTTPS؟","Secure (آمن)"], 400:["ما هي اللغة البرمجية التي تسمى 'لغة المتصفح'؟","JavaScript"], 600:["من هو مخترع شبكة الويب العالمية (WWW)؟","تيم بيرنرز لي"]},
    "كتب دينية": {200:["ما هو الكتاب المنزل على عيسى عليه السلام؟","الإنجيل"], 400:["من هو النبي الذي أنزل عليه الزبور؟","داوود عليه السلام"], 600:["كم عدد أجزاء التوراة (الأسفار الخمسة)؟","5 أسفار"]},
    "طيور نادرة": {200:["ما هو الطائر الذي يضع بيضه في أعشاش غيره؟","الوقواق"], 400:["ما هو الطائر الذي يمتلك أطول جناحين؟","القطرس"], 600:["ما هو الطائر الذي يسمى 'أبو منجل'؟","طائر مائي مقدس عند القدماء"]},
    "أساطير نوردية": {200:["من هو إله الرعد عند النورديين؟","ثور"], 400:["ما اسم المطرقة التي يحملها ثور؟","ميولنير"], 600:["ما هو 'راكناروك'؟","نهاية العالم في الأساطير النوردية"]},
    "منطق وحساب": {200:["رقم إذا ضربته في نفسه وأضفت إليه 5 أصبح 30؟","5"], 400:["ساعة تدق كل نصف ساعة، كم مرة تدق في 3 ساعات؟","6 مرات (حسب وقت البدء)"], 600:["أيهما أثقل كيلو حديد أم كيلو قطن؟","متساويان"]},
    "عمارة": {200:["أين يقع تمثال الحرية؟","نيويورك"], 400:["من بنى كاتدرائية نوتردام؟","المعمار Maurice de Sully (البدء)"], 600:["ما هو أطول جسر معلق في العالم؟","جسر تشاناكالي (تركيا)"]},
    "بحار ومحيطات": {200:["ما هو أصغر محيط في العالم؟","المحيط المتجمد الشمالي"], 400:["ما هو البحر الذي يفصل بين إيطاليا والبلقان؟","البحر الأدرياتيكي"], 600:["ما هو المضيق الذي يفصل بين أستراليا وتسمانيا؟","مضيق باس"]},
    "حقائق": {200:["كم عدد أسنان الإنسان البالغ؟","32 سن"], 400:["ما هو المعدن السائل في درجة حرارة الغرفة؟","الزئبق"], 600:["ما هو العضو الوحيد الذي يعيد بناء نفسه إذا قطع جزء منه؟","الكبد"]},
    "اختراعات حديثة": {200:["من هو مخترع محرك البحث جوجل؟","لاري بيج وسيرجي برين"], 400:["في أي عام أطلق أول هاتف آيفون؟","2007"], 600:["ما اسم أول روبوت حصل على جنسية (السعودية)؟","صوفيا"]},
    "نفس وعقل": {200:["ما هو الرهاب من الأماكن المغلقة؟","كلوستروفوبيا"], 400:["ماذا يسمى فقدان الذاكرة؟","أمنيزيا"], 600:["من هو عالم النفس صاحب تجربة 'صندوق بافلوف'؟","بافلوف (الاستجابة الشرطية)"]},
    "أمثال": {200:["أكمل: 'الطيور على أشكالها...'؟","تقع"], 400:["أكمل: 'إذا كان الكلام من فضة فالسكوت من...'؟","ذهب"], 600:["ما هو المثل الذي يضرب لمن يتدخل فيما لا يعنيه؟","من تدخل فيما لا يعنيه لقي ما لا يرضيه"]},
    "كرتون زمان": {200:["ما هو اسم القرية التي يسكنها السنافر؟","قرية السنافر"], 400:["ما اسم عدو 'ماوكلي' النمر؟","شريخان"], 600:["من هو مؤلف كابتن ماجد؟","يويتشي تاكاهاشي"]},
    "حضارات": {200:["أين قامت حضارة 'الأنكا'؟","بيرو / جبال الأنديز"], 400:["ما هي عاصمة الحضارة الآشورية؟","نينوى"], 600:["ما هو الاسم القديم لتايلاند؟","سيام"]},
    "عملات": {200:["ما هي عملة اليابان؟","الين"], 400:["ما هي عملة روسيا؟","الروبل"], 600:["ما هي عملة سويسرا؟","الفرنك السويسري"]},
    "طيور جارحة": {200:["ما هو أسرع صقر؟","الشاهين"], 400:["كم يبلغ عمر النسر تقريباً؟","70 عاماً (حسب الأسطورة/الواقع)"], 600:["ما هو ملك الطيور؟","النسر (أو العقاب الذهبي)"]},
    "كيمياء حيوية": {200:["ما هو السكر الموجود في الحليب؟","اللاكتوز"], 400:["ما هو الهرمون المسؤول عن خفض السكر؟","الأنسولين"], 600:["ما هي المادة التي تعطي العضلات طاقتها السريعة؟","الكرياتين"]}
};

let selected = [], sc = [0, 0], trn = 1, curV = 0, clock, timeElapsed = 0;

const grid = document.getElementById('cats');
Object.keys(data).forEach(c => {
    let d = document.createElement('div');
    d.className = 'cat-btn'; d.innerText = c;
    d.onclick = () => {
        if(d.classList.contains('selected')) {
            d.classList.remove('selected'); selected = selected.filter(x => x !== c);
        } else if(selected.length < 6) {
            d.classList.add('selected'); selected.push(c);
        }
        document.getElementById('start').style.display = selected.length === 6 ? 'inline-block' : 'none';
    };
    grid.appendChild(d);
});

function initGame() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    const b = document.getElementById('board');
    selected.forEach(c => {
        let r = document.createElement('div');
        r.className = 'cat-row';
        r.innerHTML = `<div class="cat-name">${c}</div><div class="val-grid">
            <div class="val-btn" onclick="ask('${c}',200,this)">200</div>
            <div class="val-btn" onclick="ask('${c}',400,this)">400</div>
            <div class="val-btn" onclick="ask('${c}',600,this)">600</div>
        </div>`;
        b.appendChild(r);
    });
}

function ask(c, v, el) {
    el.classList.add('used'); curV = v;
    document.getElementById('qBox').style.display = 'flex';
    document.getElementById('qTxt').innerText = data[c][v][0];
    document.getElementById('aTxt').innerText = data[c][v][1];
    document.getElementById('aTxt').style.display = 'none';
    document.getElementById('showA').style.display = 'block';
    document.getElementById('ctrls').style.display = 'none';
    startClock();
}

function startClock() {
    timeElapsed = 0; 
    document.getElementById('clock').innerText = timeElapsed;
    clearInterval(clock);
    clock = setInterval(() => {
        timeElapsed++; 
        document.getElementById('clock').innerText = timeElapsed;
    }, 1000);
}

function reveal() {
    clearInterval(clock);
    document.getElementById('aTxt').style.display = 'block';
    document.getElementById('showA').style.display = 'none';
    document.getElementById('ctrls').style.display = 'flex';
}

function addPts(f) {
    sc[f-1] += curV;
    document.getElementById('p1').innerText = sc[0];
    document.getElementById('p2').innerText = sc[1];
    trn = trn === 1 ? 2 : 1;
    document.getElementById('turn').innerText = "دور فريق " + trn;
    closeQ();
}

function closeQ() { document.getElementById('qBox').style.display = 'none'; }
</script>
</body>
</html>
