<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الـ 40 - تحديث الأسئلة الجديد</title>
    <style>
        :root { --accent: #ffae00; --dark-bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: var(--text); margin: 0; text-align: center; overflow: hidden; }
        .setup-screen { padding: 20px; height: 100vh; overflow-y: auto; }
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; max-width: 1000px; margin: 20px auto; }
        .cat-btn { background: var(--card-bg); border: 1px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .cat-btn.selected { border-color: var(--accent); background: #332b00; box-shadow: 0 0 10px var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; margin: 20px 0; font-weight: bold; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .game-area { display: grid; gap: 15px; padding: 15px; height: calc(100vh - 70px); overflow-y: auto; }
        .cat-row { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #333; }
        .cat-name { color: var(--accent); font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        .val-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .val-btn { background: #333; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 5px; cursor: pointer; color: #fff; }
        .val-btn.used { opacity: 0; pointer-events: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; z-index: 1000; }
        .timer { font-size: 4rem; color: #00ff88; font-weight: bold; margin-bottom: 20px; }
        .question { font-size: 1.8rem; line-height: 1.4; margin-bottom: 30px; }
        .answer { font-size: 1.6rem; color: #00ff88; border: 2px dashed #00ff88; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: none; }
        .score-btns { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .score-btn { flex: 1; padding: 15px; border-radius: 5px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="setup" class="setup-screen">
    <h1 style="color:var(--accent)">🏆 تحدي الـ 40 - أسئلة جديدة</h1>
    <p>اختر 6 فئات لبدء التحدي:</p>
    <div id="cats" class="cat-grid"></div>
    <button id="start" class="btn-main" style="display:none" onclick="initGame()">ابدأ التحدي</button>
</div>

<div id="game" style="display:none">
    <div class="header">
        <div style="color:#00ff88">فريق 1: <span id="p1">0</span></div>
        <div id="turn" style="color:var(--accent)">دور فريق 1</div>
        <div style="color:#00ff88">فريق 2: <span id="p2">0</span></div>
    </div>
    <div id="board" class="game-area"></div>
</div>

<div id="qBox" class="modal">
    <div id="clock" class="timer">0</div>
    <div id="qTxt" class="question"></div>
    <div id="aTxt" class="answer"></div>
    <button id="showA" class="btn-main" onclick="reveal()">كشف الإجابة</button>
    <div id="ctrls" class="score-btns" style="display:none">
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(1)">صح ف1</button>
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(2)">صح ف2</button>
        <button class="score-btn" style="background:#c62828" onclick="closeQ()">خطأ</button>
    </div>
</div>

<script>
const data = {
    "غزوة بدر": {200:["ما هو اليوم والتاريخ الهجري الذي وقعت فيه غزوة بدر؟","17 رمضان، العام 2 هـ"], 400:["من هو الصحابي الذي استشهد وكان أول شهيد من الأنصار في بدر؟","حارثة بن سراقة"], 600:["من هو شيطان العرب الذي حاول اغتيال النبي ﷺ بعد بدر ثم أسلم؟","عمير بن وهب"]},
    "الخلفاء": {200:["من هو الخليفة الذي لقب بـ 'ذي النورين'؟","عثمان بن عفان"], 400:["من هو الخليفة الذي أنشأ أول أسطول بحري إسلامي؟","عثمان بن عفان"], 600:["كم دامت خلافة أبو بكر الصديق رضي الله عنه؟","سنتان و3 أشهر"]},
    "كيمياء حيوية": {200:["ما هو السكر الموجود في الحليب؟","اللاكتوز"], 400:["ما هي الأحماض التي تعتبر حجر الأساس لبناء البروتين؟","الأحماض الأمينية"], 600:["ما هو الإنزيم المسؤول عن هضم النشويات في اللعاب؟","الأميليز"]},
    "النسبية": {200:["ما هو الرمز الذي يمثل سرعة الضوء في معادلات أينشتاين؟","الحرف (c)"], 400:["تؤكد النسبية أن الزمن يتباطأ عند زيادة..؟","السرعة أو الجاذبية"], 600:["ما هو اسم التجربة التي أثبتت انحناء الضوء بفعل الجاذبية عام 1919؟","تجربة إدنجتون (كسوف الشمس)"]},
    "أدب عالمي": {200:["من هو مؤلف مسرحية 'هاملت'؟","وليام شكسبير"], 400:["رواية 'الجريمة والعقاب' من تأليف أي كاتب؟","فيودور دوستويفسكي"], 600:["ما هو الاسم المستعار للكاتب إريك بلير؟","جورج أورويل"]},

    "عجائب الدنيا": {200:["أي من عجائب الدنيا السبع القديمة لا يزال قائماً؟","هرم خوفو"], 400:["أين تقع حدائق بابل المعلقة (تاريخياً)؟","العراق"], 600:["ما هو الصرح الذي بني تخليداً لذكرى زوجة الإمبراطور شاه جهان؟","تاج محل"]},
    "طب الأعصاب": {200:["ما هو أطول عصب في جسم الإنسان؟","العصب الوركي (عرق النسا)"], 400:["ما هي الوحدة الأساسية للجهاز العصبي؟","العصبون (الخلية العصبية)"], 600:["ما اسم الفص المسؤول عن الرؤية في الدماغ؟","الفص القفوي"]},
    "فيزياء الكم": {200:["ما هو الجسيم المسؤول عن حمل القوة الكهرومغناطيسية؟","الفوتون"], 400:["من صاحب تجربة 'القطة' الشهيرة في ميكانيكا الكم؟","شرودنجر"], 600:["ما هو المبدأ الذي ينص على عدم إمكانية تحديد موقع وسرعة الجسيم بدقة في آن واحد؟","مبدأ عدم اليقين (هايزنبرج)"]},
    "تاريخ حديث": {200:["في أي عام بدأت الحرب العالمية الأولى؟","1914 م"], 400:["من هو القائد الذي قاد الثورة الكوبية؟","فيديل كاسترو (وتشي جيفارا)"], 600:["ما هو اسم المعاهدة التي أنهت الحرب العالمية الأولى؟","معاهدة فرساي"]},
    "جغرافيا طبيعية": {200:["ما هو أكبر صحراء (غير متجمدة) في العالم؟","الصحراء الكبرى"], 400:["ما هو الاسم الذي يطلق على حلقة البراكين المحيطة بالمحيط الهادئ؟","حزام النار"], 600:["ما هي الدولة التي تسمى 'بلد الشمس المشرقة'؟","اليابان"]},
    "لغة الضاد": {200:["من هو واضع علم العروض؟","الخليل بن أحمد الفراهيدي"], 400:["ما هو الكتاب الذي يعتبر أول معجم لغوي عربي؟","كتاب العين"], 600:["من هو الملقب بـ 'شيخ النحاة'؟","سيبويه"]},
    "فلك متقدم": {200:["ما هو الكوكب الذي يمتلك يوماً أطول من سنته؟","الزهرة"], 400:["ما هي المجرة الأقرب لمجرتنا درب التبانة؟","أندروميدا (المرأة المسلسلة)"], 600:["ما هو 'النباض' (Pulsar) في الفضاء؟","نجم نيوتروني يدور بسرعة ويصدر إشعاعاً"]},
    "اختراعات تقنية": {200:["من هو مخترع شبكة الويب العالمية (WWW)؟","تيم بيرنرز لي"], 400:["ما هو اسم أول هاتف ذكي أنتجته شركة آبل؟","آيفون (2007)"], 600:["ما هي أول لغة برمجة عالية المستوى؟","فورتران"]},
    "فلسفة يونانية": {200:["من هو صاحب طريقة 'التوليد' في الحوار؟","سقراط"], 400:["ما اسم الأكاديمية التي أسسها أفلاطون؟","الأكاديمية"], 600:["من هو الفيلسوف الذي قال إن 'الماء أصل كل شيء'؟","طاليس"]},
    "حيوانات نادرة": {200:["ما هو الحيوان الثديي الوحيد الذي يطير؟","الخفاش"], 400:["حيوان يلقب بـ 'شيطان التسمانيا' يعيش في أي قارة؟","أستراليا"], 600:["ما هو الثديي الوحيد الذي يضع البيض؟","خلد الماء (أو آكل النمل الشوكي)"]},
    "رياضيات ذهنية": {200:["كم يساوي 12 ضرب 12؟","144"], 400:["ما هو الجذر التربيعي للعدد 625؟","25"], 600:["ما هو مجموع زوايا الشكل الخماسي المنتظم؟","540 درجة"]},
    "موسيقى كلاسيكية": {200:["من هو الملحن الذي أصيب بالصمم ولا يزال يؤلف؟","بيتهوفن"], 400:["ما هي الآلة الموسيقية التي تلقب بـ 'ملك الآلات'؟","البيانو"], 600:["من هو صاحب مقطوعة 'الفصول الأربعة'؟","فيفالدي"]},
    "كيمياء العناصر": {200:["ما هو أخف عنصر في الجدول الدوري؟","الهيدروجين"], 400:["ما هو الرمز الكيميائي للذهب؟","Au"], 600:["ما هو العنصر الذي يسمى 'الفضة السائلة'؟","الزئبق"]},
    "أساطير الشعوب": {200:["من هو إله البحر عند الرومان؟","نبتون"], 400:["ما اسم الحصان المجنح في الأساطير اليونانية؟","بيجاسوس"], 600:["ما هو 'ركناروك' في الأساطير الإسكندنافية؟","نهاية العالم"]},
    "جسم الإنسان": {200:["ما هو أكبر شريان في الجسم؟","الأبهر (الأورطي)"], 400:["أين يتم إنتاج خلايا الدم الحمراء؟","نخاع العظم"], 600:["كم عدد الفقرات في عنق الإنسان؟","7 فقرات"]},
    "عواصم منسية": {200:["ما هي عاصمة أذربيجان؟","باكو"], 400:["ما هي عاصمة منغوليا؟","أولان باتور"], 600:["ما هي عاصمة نيجيريا الحالية؟","أبوجا"]},
    "أفلام ومخرجين": {200:["من هو مخرج فيلم 'الأب الروحي' (The Godfather)؟","فرانسيس فورد كوبولا"], 400:["ما هو الفيلم الذي فاز بأول جائزة أوسكار لأفضل فيلم؟","الأجنحة (Wings)"], 600:["من المخرج الملقب بـ 'سيد التشويق'؟","ألفريد هيتشكوك"]},
    "رياضة عالمية": {200:["في أي مدينة أقيمت أول أولمبياد حديثة 1896؟","أثينا"], 400:["من هو اللاعب الملقب بـ 'الظاهرة'؟","رونالدو البرازيلي"], 600:["ما هي الدولة التي فازت بأول نسخة لكأس العالم 1930؟","الأوروغواي"]},
    "برمجيات": {200:["ما هي لغة البرمجة الأساسية لتطوير تطبيقات أندرويد؟","كوتلن (أو جافا)"], 400:["ماذا يعني اختصار SQL؟","لغة الاستعلام الهيكلية"], 600:["من هو مخترع لغة بايثون؟","غيدو فان روسم"]},
    "حقائق مذهلة": {200:["ما هو العضو الوحيد الذي يمكنه إعادة النمو في جسم الإنسان؟","الكبد"], 400:["ما هو اللون الحقيقي للشمس؟","أبيض"], 600:["كم يستغرق ضوء الشمس ليصل إلى الأرض؟","8 دقائق و20 ثانية"]},
    "تاريخ الأنبياء": {200:["من هو النبي الملقب بـ 'ذو النون'؟","يونس عليه السلام"], 400:["من هو النبي الذي تعلم منه موسى عليه السلام؟","الخضر"], 600:["من هو النبي الذي لبث في سجن مصر بضع سنين؟","يوسف عليه السلام"]},
    "صناعة السيارات": {200:["ما هي أول شركة سيارات أنتجت نظام الإنتاج الشامل؟","فورد"], 400:["ما معنى كلمة 'فولكس فاجن' باللغة الألمانية؟","سيارة الشعب"], 600:["في أي بلد تأسست شركة 'تويوتا'؟","اليابان"]},
    "عمارة": {200:["من هو المعماري الذي صمم برج إيفل؟","غوستاف إيفل"], 400:["ما هو الطراز المعماري الذي تميزت به الكاتدرائيات الأوروبية القديمة؟","القوطي"], 600:["أين يقع مبنى 'البانثيون' الشهير؟","روما"]},
    "كيمياء الأرض": {200:["ما هو المعدن الأكثر وفرة في قشرة الأرض؟","الألمنيوم"], 400:["ما هو المكون الرئيسي للماس؟","الكربون"], 600:["ما هو الغاز الذي تسببه عملية التحلل اللاهوائي في المستنقعات؟","الميثان"]},
    "أدب عربي": {200:["من هو صاحب ملحمة 'الشاهنامة'؟","الفردوسي"], 400:["من هو الشاعر الملقب بـ 'صريع الغواني'؟","مسلم بن الوليد"], 600:["ما اسم الكتاب الذي ألفه الجاحظ في طبائع الناس؟","البخلاء"]},
    "منطق وذكاء": {200:["ما هو الشيء الذي له أسنان ولا يعض؟","المشط"], 400:["أنا طويل حين أكون شاباً، وقصير حين أكون عجوزاً، فمن أنا؟","الشمعة"], 600:["ما هو الشيء الذي يكسر حتى لو لم نلمسه؟","الوعد"]},
    "حروب قديمة": {200:["من هو القائد القرطاجي الذي عبر جبال الألب بالأفيال؟","هانيبال"], 400:["ما اسم الحرب التي استمرت بين إنجلترا وفرنسا لأكثر من قرن؟","حرب المئة عام"], 600:["من هو الملك الذي قاد حملة 'العشرة آلاف'؟","قورش الأصغر"]},
    "طب شعبي": {200:["ما هو النبات الذي يسمى 'الذهب السائل'؟","زيت الزيتون"], 400:["ما هي العشبة المعروفة بتهدئة الأعصاب والمساعدة على النوم؟","البابونج"], 600:["ما هو المكون الرئيسي في الكركم الذي يعالج الالتهابات؟","الكركمين"]},
    "تقنية المستقبل": {200:["ماذا يعني اختصار AI؟","الذكاء الاصطناعي"], 400:["ما هي التقنية التي تعتمد على سلسلة الكتل؟","البلوكشين"], 600:["ما هو اسم الحوسبة التي تعتمد على 'الكيوبت'؟","الحوسبة الكمومية"]},
    "طيور جارحة": {200:["ما هو أسرع طائر في العالم عند الانقضاض؟","الصقر الجوال (الشاهين)"], 400:["ما هو الطائر الذي يلقب بـ 'ملك الطيور'؟","النسر"], 600:["أي نوع من الطيور الجارحة يتميز بالصيد الليلي الصامت؟","البومة"]},
    "أرقام قياسية": {200:["ما هو أطول بناء صنعه الإنسان؟","برج خليفة"], 400:["ما هي أعمق نقطة في محيطات العالم؟","خندق ماريانا"], 600:["ما هي أصغر دولة في العالم من حيث المساحة؟","الفاتيكان"]},
    "نباتات طبية": {200:["نبات يستخرج منه مسكن الألم 'الأسبرين'؟","الصفصاف"], 400:["ما هو النبات الذي يلقب بـ 'سيد الطعام'؟","الثوم"], 600:["ما هو النبات الذي يستخرج منه صمغ 'المستكة'؟","شجر الضرو"]},
    "فضاء متقدم": {200:["ما هو اسم التلسكوب الذي حل محل هابل؟","جيمس ويب"], 400:["ما هو الاسم الذي يطلق على انفجار النجم الضخم؟","سوبرنوفا (المستعر الأعظم)"], 600:["ما هو العنصر الذي يشكل معظم كتلة الشمس؟","الهيدروجين"]},
    "ساعات زمنية": {200:["كم عدد الثواني في اليوم الواحد؟","86400 ثانية"], 400:["ما هو التوقيت العالمي المنسق؟","UTC"], 600:["ما اسم الساعة الرملية القديمة؟","الميقاتية"]}
};

let selected = [], sc = [0, 0], trn = 1, curV = 0, clock, timeElapsed = 0;

const grid = document.getElementById('cats');
Object.keys(data).forEach(c => {
    let d = document.createElement('div');
    d.className = 'cat-btn'; d.innerText = c;
    d.onclick = () => {
        if(d.classList.contains('selected')) {
            d.classList.remove('selected'); selected = selected.filter(x => x !== c);
        } else if(selected.length < 6) {
            d.classList.add('selected'); selected.push(c);
        }
        document.getElementById('start').style.display = selected.length === 6 ? 'inline-block' : 'none';
    };
    grid.appendChild(d);
});

function initGame() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    const b = document.getElementById('board');
    selected.forEach(c => {
        let r = document.createElement('div');
        r.className = 'cat-row';
        r.innerHTML = `<div class="cat-name">${c}</div><div class="val-grid">
            <div class="val-btn" onclick="ask('${c}',200,this)">200</div>
            <div class="val-btn" onclick="ask('${c}',400,this)">400</div>
            <div class="val-btn" onclick="ask('${c}',600,this)">600</div>
        </div>`;
        b.appendChild(r);
    });
}

function ask(c, v, el) {
    el.classList.add('used'); curV = v;
    document.getElementById('qBox').style.display = 'flex';
    document.getElementById('qTxt').innerText = data[c][v][0];
    document.getElementById('aTxt').innerText = data[c][v][1];
    document.getElementById('aTxt').style.display = 'none';
    document.getElementById('showA').style.display = 'block';
    document.getElementById('ctrls').style.display = 'none';
    startClock();
}

function startClock() {
    timeElapsed = 0; 
    document.getElementById('clock').innerText = timeElapsed;
    clearInterval(clock);
    clock = setInterval(() => {
        timeElapsed++; 
        document.getElementById('clock').innerText = timeElapsed;
    }, 1000);
}

function reveal() {
    clearInterval(clock);
    document.getElementById('aTxt').style.display = 'block';
    document.getElementById('showA').style.display = 'none';
    document.getElementById('ctrls').style.display = 'flex';
}

function addPts(f) {
    sc[f-1] += curV;
    document.getElementById('p1').innerText = sc[0];
    document.getElementById('p2').innerText = sc[1];
    trn = trn === 1 ? 2 : 1;
    document.getElementById('turn').innerText = "دور فريق " + trn;
    closeQ();
}

function closeQ() { document.getElementById('qBox').style.display = 'none'; }
</script>
</body>
</html>
