<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الـ 40 - النسخة الكاملة</title>
    <style>
        :root { --accent: #ffae00; --dark-bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: var(--text); margin: 0; text-align: center; overflow: hidden; }
        .setup-screen { padding: 20px; height: 100vh; overflow-y: auto; }
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; max-width: 1000px; margin: 20px auto; }
        .cat-btn { background: var(--card-bg); border: 1px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .cat-btn.selected { border-color: var(--accent); background: #332b00; box-shadow: 0 0 10px var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; margin: 20px 0; font-weight: bold; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .game-area { display: grid; gap: 15px; padding: 15px; height: calc(100vh - 70px); overflow-y: auto; }
        .cat-row { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #333; }
        .cat-name { color: var(--accent); font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        .val-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .val-btn { background: #333; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 5px; cursor: pointer; color: #fff; }
        .val-btn.used { opacity: 0; pointer-events: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; z-index: 1000; }
        .timer { font-size: 4rem; color: #00ff88; font-weight: bold; margin-bottom: 20px; }
        .question { font-size: 1.8rem; line-height: 1.4; margin-bottom: 30px; }
        .answer { font-size: 1.6rem; color: #00ff88; border: 2px dashed #00ff88; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: none; }
        .score-btns { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .score-btn { flex: 1; padding: 15px; border-radius: 5px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="setup" class="setup-screen">
    <h1 style="color:var(--accent)">🏆 تحدي الـ 40 الفئة</h1>
    <p>اختر 6 فئات للمواجهة:</p>
    <div id="cats" class="cat-grid"></div>
    <button id="start" class="btn-main" style="display:none" onclick="initGame()">ابدأ التحدي</button>
</div>

<div id="game" style="display:none">
    <div class="header">
        <div style="color:#00ff88">ف1: <span id="p1">0</span></div>
        <div id="turn" style="color:var(--accent)">الفريق 1</div>
        <div style="color:#00ff88">ف2: <span id="p2">0</span></div>
    </div>
    <div id="board" class="game-area"></div>
</div>

<div id="qBox" class="modal">
    <div id="clock" class="timer">0</div>
    <div id="qTxt" class="question"></div>
    <div id="aTxt" class="answer"></div>
    <button id="showA" class="btn-main" onclick="reveal()">كشف الإجابة</button>
    <div id="ctrls" class="score-btns" style="display:none">
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(1)">صح ف1</button>
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(2)">صح ف2</button>
        <button class="score-btn" style="background:#c62828" onclick="closeQ()">خطأ</button>
    </div>
</div>

<script>
const data = {
    "غزوة بدر": {200:["من الصحابي الذي قتل أبا جهل؟","معاذ بن عمرو ومعاذ بن عفراء"], 400:["من الذي استأجرته قريش ليدل القافلة على طريق الساحل؟","ضمضم بن عمرو الغفاري"], 600:["كم كان عدد خيول المسلمين في الغزوة؟","فرسان فقط (للمقداد بن الأسود والزبير بن العوام)"]},
    "قرآن": {200:["سورة ذكر فيها اسم 'يحيى' لأول مرة؟","سورة مريم"], 400:["ما هي السورة التي تسمى 'الفاضحة'؟","سورة التوبة"], 600:["آية في القرآن جمعت كل حروف الهجاء؟","آخر آية في سورة الفتح"]},
    "سيرة": {200:["في أي عام وقع صلح الحديبية؟","6 هـ"], 400:["من هو الصحابي الذي نزل جبريل على صورته؟","دحية الكلبي"], 600:["من الذي كلفه النبي ﷺ بقتل كعب بن الأشرف؟","محمد بن مسلمة"]},
    "كيمياء": {200:["ما هو العنصر الوحيد السائل في درجة حرارة الغرفة (غير الزئبق)؟","البروم"], 400:["ما هو الغاز الملقب بـ 'غاز الضحك'؟","أكسيد النيتروز"], 600:["من هو مؤسس علم الكيمياء الحديثة؟","أنطوان لافوازييه"]},
    "فيزياء": {200:["ما هي وحدة قياس الشغل؟","الجول"], 400:["من صاحب نظرية النسبية الخاصة؟","أينشتاين"], 600:["ما هي القوة المسؤولة عن تماسك المجرات؟","المادة المظلمة (الجاذبية)"]},
    "رياضيات": {200:["ما هو العدد الأولي الزوجي الوحيد؟","2"], 400:["من هو مخترع الصفر؟","الخوارزمي"], 600:["ما هي قيمة 'باي' التقريبية لأقرب 4 أرقام؟","3.1415"]},
    "أحياء": {200:["ما هو أسرع حيوان بري؟","الفهد"], 400:["كم عدد صمامات قلب الإنسان؟","4 صمامات"], 600:["ما هو الهرمون المسؤول عن تنظيم السكر؟","الإنسولين"]},
    "فلك": {200:["أكبر كوكب في المجموعة الشمسية؟","المشتري"], 400:["ما هو الكوكب الذي يدور حوله 82 قمراً؟","زحل"], 600:["ما هو اسم أقرب نجم للأرض بعد الشمس؟","بروكسيما سنتوري"]},
    "تاريخ": {200:["متى سقطت الأندلس؟","1492 م"], 400:["من هو قائد معركة حطين؟","صلاح الدين الأيوبي"], 600:["من بنى تمثال أبو الهول؟","الملك خفرع"]},
    "جغرافيا": {200:["أطول نهر في العالم؟","النيل"], 400:["دولة تمتلك أكبر عدد من الجزر؟","السويد"], 600:["ما هو أخفض مكان على سطح الأرض؟","البحر الميت"]},
    "عواصم": {200:["عاصمة اليابان؟","طوكيو"], 400:["عاصمة البرازيل؟","برازيليا"], 600:["عاصمة كندا؟","أوتاوا"]},
    "لغات": {200:["ما هي اللغة الأكثر انتشاراً في العالم؟","الصينية (الماندرين)"], 400:["ما هي لغة النمسا الرسمية؟","الألمانية"], 600:["من لغات البرمجة القديمة جداً؟","فورتران"]},
    "تقنية": {200:["ما معنى اختصار RAM؟","ذاكرة الوصول العشوائي"], 400:["من مؤسس شركة آبل؟","ستيف جوبز"], 600:["ما هو اسم أول كمبيوتر في التاريخ؟","إينياك (ENIAC)"]},
    "أدب": {200:["من صاحب رواية 'البؤساء'؟","فيكتور هوغو"], 400:["من هو أمير الشعراء؟","أحمد شوقي"], 600:["من مؤلف 'حي بن يقظان'؟","ابن طفيل"]},
    "فلسفة": {200:["من هو المعلم الأول؟","أرسطو"], 400:["صاحب مقولة 'أنا أفكر إذن أنا موجود'؟","ديكارت"], 600:["من مؤسس المذهب الوجودي؟","سارتر"]},
    "رياضة": {200:["أكثر منتخب فاز بكأس العالم؟","البرازيل"], 400:["كم عدد لاعبي فريق كرة اليد؟","7 لاعبين"], 600:["من هو الهداف التاريخي للدوري الإسباني؟","ميسي"]},
    "ألعاب": {200:["كم عدد مربعات رقعة الشطرنج؟","64"], 400:["ما هي اللعبة التي تسمى 'البوكر'؟","لعبة ورق"], 600:["أول لعبة فيديو في التاريخ؟","بونج (Pong)"]},
    "سينما": {200:["من بطل فيلم تايتانيك؟","ليوناردو دي كابريو"], 400:["أول فيلم طويل لديزني؟","سـنو وايت"], 600:["مخرج فيلم 'بين النجوم' (Interstellar)؟","كريستوفر نولان"]},
    "فنون": {200:["من رسم الموناليزا؟","ليوناردو دافنشي"], 400:["أين يوجد متحف اللوفر؟","فرنسا"], 600:["من صاحب لوحة 'ليلة النجوم'؟","فان جوخ"]},
    "طب": {200:["أصغر عظمة في جسم الإنسان؟","الركاب"], 400:["فصيلة الدم التي تسمى 'المعطي العام'؟","O-"], 600:["ما هو الفيتامين الذي يصنعه الجلد بالشمس؟","دال (D)"]},
    "حيوانات": {200:["ما هو الحيوان الذي لا ينام؟","القرش"], 400:["كم قلباً للأخطبوط؟","3 قلوب"], 600:["أطول حيوان عمراً؟","قرش جرينلاند"]},
    "نباتات": {200:["أسرع نبات نمواً؟","الخيزران"], 400:["ما هي عملية صنع الغذاء في النبات؟","البناء الضوئي"], 600:["أقدم شجرة في العالم؟","شجرة ميتوشلخ"]},
    "بحار": {200:["أكبر محيط في العالم؟","الهادئ"], 400:["البحر الذي يفصل بين مصر والسعودية؟","الأحمر"], 600:["ما هو أعمق خندق بحري؟","ماريانا"]},
    "اختراعات": {200:["من اخترع الهاتف؟","غراهام بيل"], 400:["من اخترع المصباح الكهربائي؟","إديسون"], 600:["مخترع الديناميت؟","ألفرد نوبل"]},
    "حضارات": {200:["أين قامت حضارة المايا؟","المكسيك"], 400:["أقدم حضارة مسجلة؟","السومرية"], 600:["عاصمة الدولة الأموية؟","دمشق"]},
    "قصص": {200:["من قتل التنين في الأساطير؟","القديس جرجس"], 400:["ما اسم سيف علي بن أبي طالب؟","ذو الفقار"], 600:["بطل ملحمة الأوديسة؟","أوديسيوس"]},
    "فضاء": {200:["أول إنسان صعد للقمر؟","نيل أرمسترونغ"], 400:["ما هي المجرة التي تتبعها الأرض؟","درب التبانة"], 600:["ما هو الثقب الأسود؟","منطقة جاذبية هائلة لا يفلت منها الضوء"]},
    "حقائق": {200:["ما هو لون دم السلطعون؟","أزرق"], 400:["أكثر عنصر انتشاراً في الكون؟","الهيدروجين"], 600:["المدينة التي تقع في قارتين؟","إسطنبول"]},
    "منطق": {200:["ما هو الشيء الذي يمشي بلا أرجل؟","الوقت"], 400:["له عين واحدة ولا يرى؟","الإبرة"], 600:["كلما كثر نقص؟","العمر"]},
    "شركات": {200:["من يملك شركة تيسلا؟","إيلون ماسك"], 400:["مقر شركة أمازون؟","سياتل"], 600:["أغلى علامة تجارية في العالم؟","آبل"]},
    "اقتصاد": {200:["ما هي العملة الرقمية الأشهر؟","البيتكوين"], 400:["من هو صاحب كتاب 'ثروة الأمم'؟","آدم سميث"], 600:["ما معنى التضخم؟","انخفاض القوة الشرائية للعملة"]},
    "نفس": {200:["ما هو الرهاب؟","الخوف المرضي"], 400:["من مؤسس علم النفس التحليلي؟","سيجموند فرويد"], 600:["ما هي النرجسية؟","حب الذات المفرط"]},
    "سيارات": {200:["جنسية شركة مرسيدس؟","ألمانية"], 400:["أسرع سيارة في العالم حالياً؟","بوجاتي"], 600:["ما معنى شعار 'أودي'؟","اتحاد 4 شركات"]},
    "تراث": {200:["أشهر رقصة في الخليج؟","العرضة"], 400:["آلة موسيقية شرقية؟","العود"], 600:["ما هو الزي الوطني للرجال في اليابان؟","الكيمونو"]},
    "معالم": {200:["أين يقع برج بيزا المائل؟","إيطاليا"], 400:["من بنى تاج محل؟","شاه جهان"], 600:["أين توجد مدينة البتراء؟","الأردن"]},
    "إسلاميات": {200:["أول من آمن من الصبيان؟","علي بن أبي طالب"], 400:["كم عدد الأنبياء الذين ذكروا في القرآن؟","25 نبياً"], 600:["ما هي السورة التي تسمى عروس القرآن؟","الرحمن"]},
    "أرقام": {200:["كم ثانية في الساعة؟","3600"], 400:["مربع العدد 15؟","225"], 600:["الرقم الروماني X يمثل؟","10"]},
    "أفلام عربية": {200:["من بطل فيلم 'الناظر'؟","علاء ولي الدين"], 400:["أول فيلم سينمائي مصري صامت؟","ليلى"], 600:["مخرج فيلم 'المصير'؟","يوسف شاهين"]},
    "طيور": {200:["طائر لا يطير وسريع الجري؟","النعامة"], 400:["أصغر طائر في العالم؟","الطنان"], 600:["طائر يرى في الظلام الدامس؟","البومة"]},
    "ساعات": {200:["أين تقع ساعة 'بيج بن'؟","لندن"], 400:["كم دقيقة في اليوم؟","1440"], 600:["من اخترع الساعة الميكانيكية؟","بيتر هينلاين"]}
};

let selected = [], sc = [0, 0], trn = 1, curV = 0, clock, timeElapsed = 0;

const grid = document.getElementById('cats');
Object.keys(data).forEach(c => {
    let d = document.createElement('div');
    d.className = 'cat-btn'; d.innerText = c;
    d.onclick = () => {
        if(d.classList.contains('selected')) {
            d.classList.remove('selected'); selected = selected.filter(x => x !== c);
        } else if(selected.length < 6) {
            d.classList.add('selected'); selected.push(c);
        }
        document.getElementById('start').style.display = selected.length === 6 ? 'inline-block' : 'none';
    };
    grid.appendChild(d);
});

function initGame() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    const b = document.getElementById('board');
    selected.forEach(c => {
        let r = document.createElement('div');
        r.className = 'cat-row';
        r.innerHTML = `<div class="cat-name">${c}</div><div class="val-grid">
            <div class="val-btn" onclick="ask('${c}',200,this)">200</div>
            <div class="val-btn" onclick="ask('${c}',400,this)">400</div>
            <div class="val-btn" onclick="ask('${c}',600,this)">600</div>
        </div>`;
        b.appendChild(r);
    });
}

function ask(c, v, el) {
    el.classList.add('used'); curV = v;
    document.getElementById('qBox').style.display = 'flex';
    document.getElementById('qTxt').innerText = data[c][v][0];
    document.getElementById('aTxt').innerText = data[c][v][1];
    document.getElementById('aTxt').style.display = 'none';
    document.getElementById('showA').style.display = 'block';
    document.getElementById('ctrls').style.display = 'none';
    startClock();
}

function startClock() {
    timeElapsed = 0; 
    document.getElementById('clock').innerText = timeElapsed;
    clearInterval(clock);
    clock = setInterval(() => {
        timeElapsed++; 
        document.getElementById('clock').innerText = timeElapsed;
    }, 1000);
}

function reveal() {
    clearInterval(clock);
    document.getElementById('aTxt').style.display = 'block';
    document.getElementById('showA').style.display = 'none';
    document.getElementById('ctrls').style.display = 'flex';
}

function addPts(f) {
    sc[f-1] += curV;
    document.getElementById('p1').innerText = sc[0];
    document.getElementById('p2').innerText = sc[1];
    trn = trn === 1 ? 2 : 1;
    document.getElementById('turn').innerText = "الدور: الفريق " + trn;
    closeQ();
}

function closeQ() { document.getElementById('qBox').style.display = 'none'; }
</script>
</body>
</html>
