<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الـ 40 - حزمة الأسئلة النهائية</title>
    <style>
        :root { --accent: #ffae00; --dark-bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: var(--text); margin: 0; text-align: center; overflow: hidden; }
        .setup-screen { padding: 20px; height: 100vh; overflow-y: auto; }
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; max-width: 1000px; margin: 20px auto; }
        .cat-btn { background: var(--card-bg); border: 1px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .cat-btn.selected { border-color: var(--accent); background: #332b00; box-shadow: 0 0 10px var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; margin: 20px 0; font-weight: bold; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .game-area { display: grid; gap: 15px; padding: 15px; height: calc(100vh - 70px); overflow-y: auto; }
        .cat-row { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #333; }
        .cat-name { color: var(--accent); font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        .val-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .val-btn { background: #333; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 5px; cursor: pointer; color: #fff; }
        .val-btn.used { opacity: 0; pointer-events: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; z-index: 1000; }
        .timer { font-size: 4rem; color: #00ff88; font-weight: bold; margin-bottom: 20px; }
        .question { font-size: 1.8rem; line-height: 1.4; margin-bottom: 30px; }
        .answer { font-size: 1.6rem; color: #00ff88; border: 2px dashed #00ff88; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: none; }
        .score-btns { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .score-btn { flex: 1; padding: 15px; border-radius: 5px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="setup" class="setup-screen">
    <h1 style="color:var(--accent)">🏆 تحدي الـ 40 - الأسئلة الجديدة</h1>
    <p>اختر 6 فئات لبدء اللعب:</p>
    <div id="cats" class="cat-grid"></div>
    <button id="start" class="btn-main" style="display:none" onclick="initGame()">ابدأ التحدي</button>
</div>

<div id="game" style="display:none">
    <div class="header">
        <div style="color:#00ff88">فريق 1: <span id="p1">0</span></div>
        <div id="turn" style="color:var(--accent)">دور فريق 1</div>
        <div style="color:#00ff88">فريق 2: <span id="p2">0</span></div>
    </div>
    <div id="board" class="game-area"></div>
</div>

<div id="qBox" class="modal">
    <div id="clock" class="timer">0</div>
    <div id="qTxt" class="question"></div>
    <div id="aTxt" class="answer"></div>
    <button id="showA" class="btn-main" onclick="reveal()">كشف الإجابة</button>
    <div id="ctrls" class="score-btns" style="display:none">
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(1)">صح ف1</button>
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(2)">صح ف2</button>
        <button class="score-btn" style="background:#c62828" onclick="closeQ()">خطأ</button>
    </div>
</div>

<script>
const data = {
    "باب الحارة (النخبة)": {
        200: ["من هو الشخص الذي كان يختبئ في 'مغارة' وكان يظنه أهل الحارة شبحاً في الأجزاء الأولى؟", "الإدشري (سطيف) بعد هربه"],
        400: ["ما اسم الشخصية التي كانت تعمل 'حكيم' الحارة قبل أبو عصام، وقتلها صطيف الأعمى؟", "أبو إبراهيم"],
        600: ["في الجزء الأول، ما هي الأمانة التي سرقها الإدشري من منزل أبو سمعو؟", "صندوق يحتوي على ذهب ومال"]
    },
    "الخلافة الراشدة": {200:["من هو الخليفة الذي جمع القرآن في مصحف واحد؟","عثمان بن عفان"], 400:["ما اسم المعركة التي استشهد فيها جميع قادة المسلمين الثلاثة؟","معركة مؤتة"], 600:["من هو الصحابي الذي تولى القضاء في عهد عمر بن الخطاب؟","علي بن أبي طالب"]},
    "فيزياء الجسيمات": {200:["ما هو الجسيم المسؤول عن حمل القوة الكهرومغناطيسية؟","الفوتون"], 400:["من هو العالم الذي اقترح وجود 'النيوترينو'؟","فولفغانغ باولي"], 600:["ما هي الجسيمات الأولية التي يتكون منها البروتون؟","الكواركات"]},
    "كيمياء حيوية": {200:["ما هو 'سكر الدم'؟","الجلوكوز"], 400:["ما هو الفيتامين الذي يمنع مرض 'الاسقربوط'؟","فيتامين C"], 600:["ما هو المركب الذي يعتبر العملة العالمية للطاقة في الخلية؟","ATP (أدينوسين ثلاثي الفوسفات)"]},
    "تاريخ مغربي": {200:["من هو مؤسس مدينة مراكش؟","يوسف بن تاشفين"], 400:["ما اسم المعركة الشهيرة التي انتصر فيها الموحدون في الأندلس؟","معركة الأرك"], 600:["من هو الرحالة المغربي الشهير الذي جاب العالم؟","ابن بطوطة"]},
    "عمارة إسلامية": {200:["أين تقع 'قبة الصخرة'؟","القدس الشريف"], 400:["ما اسم المسجد الذي بناه عقبة بن نافع في تونس؟","جامع القيروان الكبير"], 600:["ما هو الطراز المعماري الذي يشتهر بالأقواس المحدوة في الأندلس؟","الطراز الموريسكي"]},
    "تقنية الذكاء": {200:["ماذا يعني اختصار AI؟","الذكاء الاصطناعي"], 400:["من هو العالم الملقب بـ 'أبو الذكاء الاصطناعي'؟","آلان تورينج (أو جون مكارثي)"], 600:["ما هو اسم النموذج اللغوي الذي طورته جوجل لمنافسة GPT؟","Gemini (أو سابقاً Bard)"]},
    "أدب روسي": {200:["من هو مؤلف رواية 'الحرب والسلام'؟","ليو تولستوي"], 400:["ما هي الرواية الشهيرة لدوستويفسكي عن الندم والجريمة؟","الجريمة والعقاب"], 600:["من هو الكاتب الروسي صاحب مسرحية 'النورس'؟","أنطون تشيخوف"]},
    "فلك كوني": {200:["ما هو أكبر كوكب في المجموعة الشمسية؟","المشتري"], 400:["ما هو اسم المجرة الأقرب إلينا والتي ستصطدم بدرب التبانة مستقبلاً؟","أندروميدا"], 600:["ما هو الانزياح الأحمر (Redshift) في الفلك؟","دليل على تمدد الكون وابتعاد المجرات"]},
    "رياضيات ذهنية": {200:["كم يساوي 15% من 200؟","30"], 400:["ما هو مكعب الرقم 5؟","125"], 600:["ما هو مجموع الزوايا الداخلية للشكل السداسي؟","720 درجة"]},
    "طب الأعصاب": {200:["ما هو العضو المسؤول عن التوازن في جسم الإنسان؟","المخيخ (في الدماغ) أو الأذن الداخلية"], 400:["ما هو أطول عصب في جسم الإنسان؟","العصب الوركي"], 600:["ما هو الاسم العلمي للخلية العصبية؟","العصبون (Neuron)"]},
    "جغرافيا سياسية": {200:["ما هي الدولة التي تسمى 'أرض الفيروز'؟","سيناء (مصر)"], 400:["ما هي الدولة الوحيدة التي تقع في 4 نصف كرات أرضية؟","كيريباتي"], 600:["ما هو المضيق الذي يفصل بين روسيا وأمريكا (ألاسكا)؟","مضيق بيرنغ"]},
    "حضارة الفراعنة": {200:["من هو الملك الذي بني الهرم الأكبر؟","خوفو"], 400:["ما هو الاسم القديم لنهر النيل عند الفراعنة؟","حابي"], 600:["من هو الوزير المعماري الذي صمم هرم زوسر المدرج؟","إيمحوتب"]},
    "لغات ميتة": {200:["ما هي اللغة التي كانت تستخدم في الإمبراطورية الرومانية؟","اللاتينية"], 400:["ما هي لغة المصريين القدماء المكتوبة بالصور؟","الهيروغليفية"], 600:["ما هي اللغة القديمة التي كانت لغة العلم في الهند؟","السنسكريتية"]},
    "ألعاب ذكاء": {200:["كم عدد خانات رقعة الشطرنج؟","64 خانة"], 400:["ما اسم اللعبة اليابانية التي تعتمد على الأرقام من 1 إلى 9؟","سودوكو"], 600:["من هو بطل العالم الحالي في الشطرنج (حتى 2024)؟","دينغ ليرين"]},
    "ساعات تاريخية": {200:["أين تقع ساعة بيج بن؟","لندن"], 400:["من هو أول من اخترع الساعة المائية؟","المصريون القدماء (أو البابليون)"], 600:["ما هي 'ساعة القيامة' الرمزية؟","ساعة توضح مدى قرب البشرية من الفناء النووي"]},
    "حيوانات مائية": {200:["ما هو أكبر حيوان على الأرض؟","الحوت الأزرق"], 400:["كم عدد أذرع الأخطبوط؟","8 أذرع"], 600:["ما هو الحيوان البحري الذي يمتلك 3 قلوب؟","الأخطبوط"]},
    "نباتات نادرة": {200:["ما هو النبات الذي يأكل الحشرات؟","فينوس (خناق الذباب)"], 400:["ما هو الشجر الذي يستخرج منه الفلين؟","بلوط الفلين"], 600:["ما هو النبات الذي ينمو في الصحراء ويخزن الماء؟","الصبار"]},
    "اقتصاد عالمي": {200:["ما هي العملة الرسمية للاتحاد الأوروبي؟","اليورو"], 400:["ماذا يعني اختصار GDP؟","الناتج المحلي الإجمالي"], 600:["ما هو 'مؤشر داو جونز'؟","مؤشر لأسهم أكبر 30 شركة أمريكية"]},
    "تاريخ حديث": {200:["في أي عام بدأت الثورة الفرنسية؟","1789"], 400:["من هو الزعيم الذي قاد الهند للاستقلال؟","المهاتما غاندي"], 600:["ما هو 'وعد بلفور' المشؤوم وفي أي عام صدر؟","وعد بإنشاء وطن لليهود في فلسطين (1917)"]},
    "إسلاميات متقدمة": {200:["من هي الملقبة بـ 'ذات النطاقين'؟","أسماء بنت أبي بكر"], 400:["ما هي أطول سورة في القرآن الكريم؟","البقرة"], 600:["من هو النبي الذي صام عن الكلام 3 أيام؟","زكريا عليه السلام"]},
    "كيمياء العناصر": {200:["ما هو الرمز الكيميائي للحديد؟","Fe"], 400:["ما هو الغاز الملقب بـ 'القاتل الصامت'؟","أول أكسيد الكربون"], 600:["ما هو العنصر الذي يمثل 21% من غلاف الأرض الجوي؟","الأكسجين"]},
    "فيزياء ميكانيكية": {200:["ما هو قانون نيوتن الأول؟","قانون القصور الذاتي"], 400:["ما هي وحدة قياس الشغل والطاقة؟","الجول"], 600:["ما هي سرعة الجاذبية الأرضية (التعجيل)؟","9.8 م/ث²"]},
    "أدب إنجليزي": {200:["من هو مؤلف 'روميو وجولييت'؟","شكسبير"], 400:["من كتبت رواية 'كبرياء وتحامل'؟","جين أوستن"], 600:["من هو صاحب سلسلة 'هاري بوتر'؟","جيه كيه رولينج"]},
    "فنون تشكيلية": {200:["من رسم لوحة 'الموناليزا'؟","ليوناردو دافنشي"], 400:["من هو الفنان الذي قطع أذنه؟","فان جوخ"], 600:["ما هي المدرسة الفنية التي أسسها بابلو بيكاسو؟","التكعيبية"]},
    "سيارات": {200:["ما هي جنسية شركة 'مرسيدس'؟","ألمانية"], 400:["ما هي أول شركة سيارات أنتجت سيارة كهربائية بكميات ضخمة؟","تسلا"], 600:["من هو مؤسس شركة 'فيراري'؟","إنزو فيراري"]},
    "منطق وألغاز": {200:["ما هو الشيء الذي يحوي مدناً بلا بيوت؟","الخريطة"], 400:["ابن أمك وأبوك وليس أخوك، فمن هو؟","أنت"], 600:["ما هو الشيء الذي يكسر بمجرد النطق باسمه؟","الصمت"]},
    "طيور": {200:["ما هو الطائر الذي لا يطير ويعيش في القطب الجنوبي؟","البطريق"], 400:["ما هو أسرع طائر في العالم؟","الصقر الجوال"], 600:["ما هو الطائر الوحيد الذي يرضع صغاره (بمادة تشبه الحليب)؟","الحمام (لبن الحوصلة)"]},
    "أساطير إغريقية": {200:["من هو إله البحر عند الإغريق؟","بوسيدون"], 400:["من هو البطل الذي قتل 'ميدوسا'؟","برسيوس"], 600:["ما هو 'كعب أخيل'؟","نقطة الضعف الوحيدة في البطل أخيل"]},
    "برمجيات": {200:["ما هي لغة البرمجة الأكثر استخداماً في تطوير الويب؟","JavaScript"], 400:["ما هو نظام التشغيل مفتوح المصدر الأكثر شهرة؟","Linux"], 600:["ماذا يعني اختصار SQL؟","لغة الاستعلام المهيكلية (Structured Query Language)"]},
    "سينما": {200:["من هو مخرج فيلم 'تايتانيك'؟","جيمس كاميرون"], 400:["ما هو الفيلم الذي فاز بأول جائزة أوسكار؟","Wings (1927)"], 600:["من هو الممثل صاحب أكبر عدد من جوائز الأوسكار (4 جوائز)؟","كاثرين هيبورن"]},
    "اختراعات": {200:["من اخترع الديناميت؟","ألفرد نوبل"], 400:["من اخترع الراديو؟","ماركوني"], 600:["من اخترع الطباعة؟","يوهان غوتنبرغ"]},
    "تراث شعبي": {200:["ما هو الزي التقليدي للمرأة في اليابان؟","الكيمونو"], 400:["ما هي أشهر رقصة شعبية في فلسطين؟","الدبكة"], 600:["ما اسم الآلة الموسيقية الخشبية الشهيرة في العراق؟","الجوزة (أو العود البغدادي)"]},
    "بحار ومحيطات": {200:["ما هو أكبر محيط في العالم؟","المحيط الهادئ"], 400:["ما هو البحر الذي يسمى 'بحر الروم' قديماً؟","البحر الأبيض المتوسط"], 600:["أين يقع خندق ماريانا (أعمق نقطة في العالم)؟","المحيط الهادئ"]},
    "عمارة حديثة": {200:["أين يقع برج خليفة؟","دبي"], 400:["من صمم برج إيفل؟","غوستاف إيفل"], 600:["ما هو اسم المهندسة العراقية العالمية التي صممت ملاعب قطر؟","زها حديد"]},
    "حقائق مذهلة": {200:["ما هو لون لسان الزرافة؟","أزرق داكن/أرجواني"], 400:["كم عدد قلوب الأخطبوط؟","3 قلوب"], 600:["ما هو الكوكب الذي يمطر ألماساً؟","نبتون (أو زحل)"]},
    "أرقام قياسية": {200:["ما هي أعلى قمة جبل في العالم؟","إيفرست"], 400:["ما هي أطول رحلة طيران بدون توقف؟","نيويورك إلى سنغافورة"], 600:["من هو الإنسان الذي قضى أطول فترة في الفضاء؟","أوليغ كونونينكو"]},
    "نفس وعقل": {200:["ما هو تعريف 'الفوبيا'؟","خوف مرضي غير مبرر"], 400:["ما هو 'تأثير وهمي' (Placebo)؟","تحسن المريض بسبب اعتقاده بتلقي العلاج"], 600:["من هو عالم النفس صاحب نظرية 'التكييف الكلاسيكي' (الكلب والجرس)؟","إيفان بافلوف"]},
    "حروب قديمة": {200:["من هو القائد الذي عبر جبال الألب بالأفيال؟","هانيبال"], 400:["ما هي الحرب التي استمرت بين إنجلترا وفرنسا لأكثر من 100 عام؟","حرب المئة عام"], 600:["ما اسم السفينة الحربية اليونانية القديمة الشهيرة؟","ترايريم (Trireme)"]},
    "أمثال عربية": {200:["أكمل: 'الطيور على أشكالها...'؟","تقع"], 400:["من شب على شيء...؟","شاب عليه"], 600:["ما قصة 'رجع بخفي حنين'؟","تضرب لمن يعود بالخيبة بعد الطمع"]}
};

let selected = [], sc = [0, 0], trn = 1, curV = 0, clock, timeElapsed = 0;

const grid = document.getElementById('cats');
Object.keys(data).forEach(c => {
    let d = document.createElement('div');
    d.className = 'cat-btn'; d.innerText = c;
    d.onclick = () => {
        if(d.classList.contains('selected')) {
            d.classList.remove('selected'); selected = selected.filter(x => x !== c);
        } else if(selected.length < 6) {
            d.classList.add('selected'); selected.push(c);
        }
        document.getElementById('start').style.display = selected.length === 6 ? 'inline-block' : 'none';
    };
    grid.appendChild(d);
});

function initGame() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    const b = document.getElementById('board');
    selected.forEach(c => {
        let r = document.createElement('div');
        r.className = 'cat-row';
        r.innerHTML = `<div class="cat-name">${c}</div><div class="val-grid">
            <div class="val-btn" onclick="ask('${c}',200,this)">200</div>
            <div class="val-btn" onclick="ask('${c}',400,this)">400</div>
            <div class="val-btn" onclick="ask('${c}',600,this)">600</div>
        </div>`;
        b.appendChild(r);
    });
}

function ask(c, v, el) {
    el.classList.add('used'); curV = v;
    document.getElementById('qBox').style.display = 'flex';
    document.getElementById('qTxt').innerText = data[c][v][0];
    document.getElementById('aTxt').innerText = data[c][v][1];
    document.getElementById('aTxt').style.display = 'none';
    document.getElementById('showA').style.display = 'block';
    document.getElementById('ctrls').style.display = 'none';
    startClock();
}

function startClock() {
    timeElapsed = 0; 
    document.getElementById('clock').innerText = timeElapsed;
    clearInterval(clock);
    clock = setInterval(() => {
        timeElapsed++; 
        document.getElementById('clock').innerText = timeElapsed;
    }, 1000);
}

function reveal() {
    clearInterval(clock);
    document.getElementById('aTxt').style.display = 'block';
    document.getElementById('showA').style.display = 'none';
    document.getElementById('ctrls').style.display = 'flex';
}

function addPts(f) {
    sc[f-1] += curV;
    document.getElementById('p1').innerText = sc[0];
    document.getElementById('p2').innerText = sc[1];
    trn = trn === 1 ? 2 : 1;
    document.getElementById('turn').innerText = "دور فريق " + trn;
    closeQ();
}

function closeQ() { document.getElementById('qBox').style.display = 'none'; }
</script>
</body>
</html>
