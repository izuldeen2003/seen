<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الـ 40 - نسخة الأسئلة المعقدة</title>
    <style>
        :root { --accent: #ffae00; --dark-bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: var(--text); margin: 0; text-align: center; overflow: hidden; }
        .setup-screen { padding: 20px; height: 100vh; overflow-y: auto; }
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; max-width: 1000px; margin: 20px auto; }
        .cat-btn { background: var(--card-bg); border: 1px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .cat-btn.selected { border-color: var(--accent); background: #332b00; box-shadow: 0 0 10px var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; margin: 20px 0; font-weight: bold; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .game-area { display: grid; gap: 15px; padding: 15px; height: calc(100vh - 70px); overflow-y: auto; }
        .cat-row { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #333; }
        .cat-name { color: var(--accent); font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        .val-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .val-btn { background: #333; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 5px; cursor: pointer; color: #fff; }
        .val-btn.used { opacity: 0; pointer-events: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; z-index: 1000; }
        .timer { font-size: 4rem; color: #00ff88; font-weight: bold; margin-bottom: 20px; }
        .question { font-size: 1.8rem; line-height: 1.4; margin-bottom: 30px; }
        .answer { font-size: 1.6rem; color: #00ff88; border: 2px dashed #00ff88; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: none; }
        .score-btns { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .score-btn { flex: 1; padding: 15px; border-radius: 5px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="setup" class="setup-screen">
    <h1 style="color:var(--accent)">🔥 تحدي الـ 40 - الأسئلة المحدّثة</h1>
    <p>اختر 6 فئات للمواجهة الكبرى:</p>
    <div id="cats" class="cat-grid"></div>
    <button id="start" class="btn-main" style="display:none" onclick="initGame()">ابدأ التحدي</button>
</div>

<div id="game" style="display:none">
    <div class="header">
        <div style="color:#00ff88">فريق 1: <span id="p1">0</span></div>
        <div id="turn" style="color:var(--accent)">دور فريق 1</div>
        <div style="color:#00ff88">فريق 2: <span id="p2">0</span></div>
    </div>
    <div id="board" class="game-area"></div>
</div>

<div id="qBox" class="modal">
    <div id="clock" class="timer">0</div>
    <div id="qTxt" class="question"></div>
    <div id="aTxt" class="answer"></div>
    <button id="showA" class="btn-main" onclick="reveal()">كشف الإجابة</button>
    <div id="ctrls" class="score-btns" style="display:none">
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(1)">صح ف1</button>
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(2)">صح ف2</button>
        <button class="score-btn" style="background:#c62828" onclick="closeQ()">خطأ</button>
    </div>
</div>

<script>
const data = {
    "باب الحارة (مستحيل)": {
        200: ["من هو الشخص الذي كان يزود 'صطيف الأعمى' بالمعلومات من داخل الحارة؟", "أبو النار (بشكل غير مباشر عبر فتن الإدشري) أو الجاسوس 'حمدي'"],
        400: ["ما هو السبب الحقيقي لوفاة شخصية 'أبو حاتم' (في سياق القصة) وكيف تم تبرير غيابه؟", "استشهد في جبهة القتال ضد الفرنسيين (بعد اعتذار الممثل وفيق الزعيم بسبب المرض)"],
        600: ["ما اسم الشخصية التي انتحلت صفة 'ساري' ابن 'أبو عصام' المفقود في الجزء الثامن؟", "الشخصية التي أداها الممثل (مصطفى سعد الدين) وكان اسمه 'رأفت'"]
    },
    "تاريخ عثماني": {200:["من هو السلطان الملقب بـ 'القانوني'؟","سليمان القانوني"], 400:["ما هو اسم المعركة التي فتحت أبواب الأناضول للعثمانيين؟","معركة ملاذكرد"], 600:["من هو السلطان الذي ألغى نظام 'الإنكشارية'؟","محمود الثاني"]},
    "فيزياء نووية": {200:["ما هي الجسيمات التي تتكون منها النواة؟","بروتونات ونيوترونات"], 400:["ما هو العنصر المستخدم كوقود في المفاعلات النووية؟","اليورانيوم (235)"], 600:["ما اسم العملية التي يتم فيها دمج نواتين خفيفتين لإنتاج طاقة؟","الاندماج النووي"]},
    "كيمياء معادن": {200:["ما هو المعدن السائل الوحيد؟","الزئبق"], 400:["ما هو الاسم الشائع لأكسيد الحديد؟","الصدأ"], 600:["ما هو المعدن الذي يمتلك أعلى درجة انصهار؟","التنجستن"]},
    "طب جراحة": {200:["ما هو الغاز المستخدم في التخدير قديماً؟","الإيثر"], 400:["ما هو العصب المسؤول عن حركة عضلات الوجه؟","العصب السابع (العصب الوجهي)"], 600:["ما هي فصيلة الدم التي يمكنها إعطاء جميع الفصائل الأخرى؟","O-"]},
    "فلك متقدم": {200:["ما هو أكبر أقمار كوكب المشتري؟","غانيميد"], 400:["ما هو الاسم الذي يطلق على الحدود الخارجية للثقب الأسود؟","أفق الحدث (Event Horizon)"], 600:["كم تبلغ سرعة الضوء التقريبية بالكيلومتر في الثانية؟","300,000 كم/ث"]},
    "برمجة": {200:["ماذا يعني اختصار HTML؟","HyperText Markup Language"], 400:["ما هي اللغة البرمجية المستخدمة في تطوير نظام iOS بشكل أساسي؟","سويفت (Swift)"], 600:["ما هو مفهوم 'OOP' في البرمجة؟","البرمجة كائنية التوجه (Object-Oriented Programming)"]},
    "أساطير نوردية": {200:["من هو ملك الآلهة في الأساطير الإسكندنافية؟","أودين"], 400:["ما اسم المطرقة الخاصة بـ 'ثور'؟","ميولنير"], 600:["ما هي 'فالهالا'؟","قاعة المحاربين القتلى في النعيم"]},
    "إسلاميات": {200:["من هو الصحابي الذي اهتز لموته عرش الرحمن؟","سعد بن معاذ"], 400:["كم عدد السور التي تبدأ بـ 'ألم'؟","6 سور"], 600:["ما هي السورة التي تسمى 'الفاضحة'؟","سورة التوبة"]},
    "جغرافيا": {200:["ما هي أصغر دولة في العالم؟","الفاتيكان"], 400:["ما هو أطول نهر في أوروبا؟","نهر الفولغا"], 600:["في أي قارة تقع دولة 'سورينام'؟","أمريكا الجنوبية"]},
    "تاريخ الأندلس": {200:["ما هي آخر مملكة إسلامية سقطت في الأندلس؟","مملكة غرناطة"], 400:["من هو القائد الذي انتصر في معركة الأرك؟","المنصور بن أبي عامر (أو السلطان الموحدي يعقوب المنصور)"], 600:["ما اسم القصر الشهير في غرناطة؟","قصر الحمراء"]},
    "حيوانات": {200:["ما هو الحيوان الذي لا ينام؟","القرش (لأن حركته توفر الأكسجين)"], 400:["كم قلباً للأخطبوط؟","3 قلوب"], 600:["ما هو أذكى حيوان لا فقاري؟","الأخطبوط"]},
    "نباتات": {200:["ما هو النبات الذي يسمى 'سيد الطعام'؟","الثوم"], 400:["ما هو أسرع نبات نمواً في العالم؟","الخيزران (البامبو)"], 600:["ما اسم العملية التي يحول فيها النبات الضوء إلى طاقة؟","البناء الضوئي"]},
    "أرقام": {200:["ما هو العدد الأولي الزوجي الوحيد؟","2"], 400:["ما هو الرقم الروماني للعدد 100؟","C"], 600:["كم يساوي الرقم 'باي' (π) لأقرب رقمين عشريين؟","3.14"]},
    "رياضة": {200:["من هو اللاعب الأكثر فوزاً بالكرة الذهبية؟","ميسي"], 400:["كم عدد لاعبي فريق كرة اليد؟","7 لاعبين"], 600:["من فاز بكأس العالم لكرة القدم عام 1998؟","فرنسا"]},
    "أدب": {200:["من كتب رواية 'البؤساء'؟","فيكتور هوغو"], 400:["من هو مؤلف 'ألف ليلة وليلة'؟","غير معروف (تراث شعبي)"], 600:["ما هو الاسم الحقيقي للكاتب 'مارك توين'؟","صمويل كليمنس"]},
    "فلسفة": {200:["من هو صاحب مقولة 'أنا أفكر إذن أنا موجود'؟","رينيه ديكارت"], 400:["من هو المعلم الأول؟","أرسطو"], 600:["من هو مؤسس الفلسفة الوجودية؟","سيرين كيركغور (أو سارتر في العصر الحديث)"]},
    "سينما": {200:["من هو بطل فيلم 'تايتانيك'؟","ليوناردو دي كابريو"], 400:["ما هو أول فيلم طويل بتقنية الألوان؟","بيكي شارب (أو سنو وايت للرسوم)"], 600:["من هو مخرج فيلم 'Inception'؟","كريستوفر نولان"]},
    "لغات": {200:["ما هي اللغة الرسمية في النمسا؟","الألمانية"], 400:["ما هي اللغة الأكثر تحدثاً في العالم كـ 'لغة أم'؟","الصينية (الماندرين)"], 600:["ما هي اللغة الرسمية في إثيوبيا؟","الأمهرية"]},
    "عواصم": {200:["ما هي عاصمة كندا؟","أوتاوا"], 400:["ما هي عاصمة البرازيل؟","برازيليا"], 600:["ما هي عاصمة كازاخستان؟","أستانا"]},
    "اختراعات": {200:["من اخترع الهاتف؟","ألكسندر غراهام بيل"], 400:["من اخترع الطائرة؟","الأخوين رايت"], 600:["من اخترع المجهر البسيط؟","أنطوني فان ليفينهوك"]},
    "حقائق": {200:["ما هو لون دم السلطعون؟","أزرق"], 400:["ما هو العضو الذي لا ينمو منذ الولادة؟","عدسة العين"], 600:["كم عدد فقرات عنق الزرافة؟","7 فقرات (مثل الإنسان)"]},
    "سيارات": {200:["ما هي شركة السيارات التي شعارها 'أربع حلقات'؟","أودي"], 400:["ما هي أسرع سيارة في العالم حالياً؟","بوجاتي شيرون (أو SSC Tuatara)"], 600:["من هو مؤسس شركة 'فيراري'؟","إنزو فيراري"]},
    "تقنية": {200:["ما هو اسم أول كمبيوتر في التاريخ؟","إينياك (ENIAC)"], 400:["من هو مؤسس شركة أمازون؟","جيف بيزوس"], 600:["ماذا يعني اختصار RAM؟","ذاكرة الوصول العشوائي (Random Access Memory)"]},
    "حضارات": {200:["أين قامت حضارة المايا؟","المكسيك وأمريكا الوسطى"], 400:["ما اسم الكتاب المقدس عند الفرس القدماء؟","الأفستا"], 600:["من هو الملك الذي بنى تمثال أبو الهول؟","خفرع"]},
    "أمثال": {200:["أكمل: 'على نفسها جنت...'؟","براقش"], 400:["ماذا يضرب المثل بـ 'عنقاء مغرب'؟","للمستحيلات"], 600:["أكمل: 'مكره أخاك لا...'؟","بطل"]},
    "منطق": {200:["له أسنان ولا يعض؟","المشط"], 400:["كلما كثر نقص؟","العمر"], 600:["يمشي بلا أرجل ويدخل الأذنين بلا استئذان؟","الصوت"]},
    "بحار": {200:["ما هو أملح بحر في العالم؟","البحر الميت"], 400:["ما هو المضيق الذي يربط البحر الأحمر بالمحيط الهندي؟","باب المندب"], 600:["ما هو أعمق خندق في المحيطات؟","خندق ماريانا"]},
    "طيور": {200:["ما هو الطائر الذي يرى في الظلام؟","البومة"], 400:["ما هو أصغر طائر في العالم؟","الطنان"], 600:["ما هو الطائر الذي يلقب بـ 'الجمل الطائر'؟","النعامة"]},
    "سيرة": {200:["من هي حاضنة النبي ﷺ؟","أم أيمن (بركة الحبشية)"], 400:["في أي عام وقع صلح الحديبية؟","6 هـ"], 600:["من هو الصحابي الذي لقب بـ 'أمين هذه الأمة'؟","أبو عبيدة بن الجراح"]},
    "حروب": {200:["متى بدأت الحرب العالمية الثانية؟","1939"], 400:["ما هي الحرب التي استمرت 100 عام؟","حرب المئة عام (بين إنجلترا وفرنسا)"], 600:["ما اسم المعركة التي هُزم فيها نابليون نهائياً؟","معركة واترلو"]},
    "ساعات": {200:["كم دقيقة في اليوم؟","1440 دقيقة"], 400:["من اخترع الساعة الميكانيكية؟","بيتر هينلاين"], 600:["ما هو نظام التوقيت العالمي؟","توقيت غرينتش (GMT/UTC)"]},
    "بناء": {200:["أين يقع برج بيزا المائل؟","إيطاليا"], 400:["من بنى تاج محل؟","شاه جهان"], 600:["ما هو أطول جسر في العالم؟","جسر دانيانغ-كونشان في الصين"]},
    "اقتصاد": {200:["ما هي العملة الرسمية للصين؟","اليوان"], 400:["ما معنى 'التضخم'؟","انخفاض القوة الشرائية للعملة"], 600:["من هو مؤسس علم الاقتصاد الحديث؟","آدم سميث"]},
    "نفس": {200:["ما هو الرهاب؟","الخوف المرضي (فوبيا)"], 400:["من هو مؤسس التحليل النفسي؟","سيجموند فرويد"], 600:["ما هي 'النرجسية'؟","حب الذات المفرط"]},
    "تراث": {200:["ما هي أشهر رقصة شعبية في الخليج؟","العرضة"], 400:["ما اسم الزي التقليدي للرجال في اسكتلندا؟","الكيـلت"], 600:["ما هي 'الدبكة'؟","رقصة شعبية في بلاد الشام"]},
    "أساطير": {200:["من هو إله الرعد عند اليونان؟","زيوس"], 400:["ما هو حصان البحر الأسطوري؟","هيبوكامبوس"], 600:["من هي 'فينوس'؟","إلهة الحب والجمال عند الرومان"]},
    "طيور جارحة": {200:["ما هو أسرع صقر؟","الشاهين"], 400:["ما هو لقب النسر؟","ملك الطيور"], 600:["كم تبلغ قوة بصر النسر مقارنة بالإنسان؟","8 أضعاف"]},
    "كيمياء حيوية": {200:["ما هو السكر الموجود في الفواكه؟","الفركتوز"], 400:["ما هي الوحدة البنائية للبروتين؟","الأحماض الأمينية"], 600:["ما هو الفيتامين المسؤول عن تجلط الدم؟","فيتامين K"]},
    "أفلام كرتون": {200:["من هو عدو 'توم وجيري'؟","سبايك (الكلب)"], 400:["ما اسم القرية التي يسكنها السنافر؟","قرية السنافر"], 600:["من هو مؤلف 'كابتن ماجد'؟","يويتشي تاكاهاشي"]}
};

let selected = [], sc = [0, 0], trn = 1, curV = 0, clock, timeElapsed = 0;

const grid = document.getElementById('cats');
Object.keys(data).forEach(c => {
    let d = document.createElement('div');
    d.className = 'cat-btn'; d.innerText = c;
    d.onclick = () => {
        if(d.classList.contains('selected')) {
            d.classList.remove('selected'); selected = selected.filter(x => x !== c);
        } else if(selected.length < 6) {
            d.classList.add('selected'); selected.push(c);
        }
        document.getElementById('start').style.display = selected.length === 6 ? 'inline-block' : 'none';
    };
    grid.appendChild(d);
});

function initGame() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    const b = document.getElementById('board');
    selected.forEach(c => {
        let r = document.createElement('div');
        r.className = 'cat-row';
        r.innerHTML = `<div class="cat-name">${c}</div><div class="val-grid">
            <div class="val-btn" onclick="ask('${c}',200,this)">200</div>
            <div class="val-btn" onclick="ask('${c}',400,this)">400</div>
            <div class="val-btn" onclick="ask('${c}',600,this)">600</div>
        </div>`;
        b.appendChild(r);
    });
}

function ask(c, v, el) {
    el.classList.add('used'); curV = v;
    document.getElementById('qBox').style.display = 'flex';
    document.getElementById('qTxt').innerText = data[c][v][0];
    document.getElementById('aTxt').innerText = data[c][v][1];
    document.getElementById('aTxt').style.display = 'none';
    document.getElementById('showA').style.display = 'block';
    document.getElementById('ctrls').style.display = 'none';
    startClock();
}

function startClock() {
    timeElapsed = 0; 
    document.getElementById('clock').innerText = timeElapsed;
    clearInterval(clock);
    clock = setInterval(() => {
        timeElapsed++; 
        document.getElementById('clock').innerText = timeElapsed;
    }, 1000);
}

function reveal() {
    clearInterval(clock);
    document.getElementById('aTxt').style.display = 'block';
    document.getElementById('showA').style.display = 'none';
    document.getElementById('ctrls').style.display = 'flex';
}

function addPts(f) {
    sc[f-1] += curV;
    document.getElementById('p1').innerText = sc[0];
    document.getElementById('p2').innerText = sc[1];
    trn = trn === 1 ? 2 : 1;
    document.getElementById('turn').innerText = "دور فريق " + trn;
    closeQ();
}

function closeQ() { document.getElementById('qBox').style.display = 'none'; }
</script>
</body>
</html>
