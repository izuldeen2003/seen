<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الـ 40 - نسخة الأساطير والرياضة</title>
    <style>
        :root { --accent: #ffae00; --dark-bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: var(--text); margin: 0; text-align: center; overflow: hidden; }
        .setup-screen { padding: 20px; height: 100vh; overflow-y: auto; }
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; max-width: 1000px; margin: 20px auto; }
        .cat-btn { background: var(--card-bg); border: 1px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .cat-btn.selected { border-color: var(--accent); background: #332b00; box-shadow: 0 0 10px var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; margin: 20px 0; font-weight: bold; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .game-area { display: grid; gap: 15px; padding: 15px; height: calc(100vh - 70px); overflow-y: auto; }
        .cat-row { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #333; }
        .cat-name { color: var(--accent); font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        .val-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .val-btn { background: #333; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 5px; cursor: pointer; color: #fff; }
        .val-btn.used { opacity: 0; pointer-events: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; z-index: 1000; }
        .timer { font-size: 4rem; color: #00ff88; font-weight: bold; margin-bottom: 20px; }
        .question { font-size: 1.8rem; line-height: 1.4; margin-bottom: 30px; }
        .answer { font-size: 1.6rem; color: #00ff88; border: 2px dashed #00ff88; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: none; }
        .score-btns { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .score-btn { flex: 1; padding: 15px; border-radius: 5px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="setup" class="setup-screen">
    <h1 style="color:var(--accent)">🏆 تحدي الـ 40 - نسخة 2026</h1>
    <p>اختر 6 فئات (تأكد من اختيار باب الحارة والرياضة للتحدي):</p>
    <div id="cats" class="cat-grid"></div>
    <button id="start" class="btn-main" style="display:none" onclick="initGame()">ابدأ المواجهة</button>
</div>

<div id="game" style="display:none">
    <div class="header">
        <div style="color:#00ff88">فريق 1: <span id="p1">0</span></div>
        <div id="turn" style="color:var(--accent)">دور فريق 1</div>
        <div style="color:#00ff88">فريق 2: <span id="p2">0</span></div>
    </div>
    <div id="board" class="game-area"></div>
</div>

<div id="qBox" class="modal">
    <div id="clock" class="timer">0</div>
    <div id="qTxt" class="question"></div>
    <div id="aTxt" class="answer"></div>
    <button id="showA" class="btn-main" onclick="reveal()">كشف الإجابة</button>
    <div id="ctrls" class="score-btns" style="display:none">
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(1)">صح ف1</button>
        <button class="score-btn" style="background:#2e7d32" onclick="addPts(2)">صح ف2</button>
        <button class="score-btn" style="background:#c62828" onclick="closeQ()">خطأ</button>
    </div>
</div>

<script>
const data = {
    "باب الحارة (أساطير)": {
        200: ["من هو الممثل الذي حل بديلاً لـ 'عباس النوري' في دور أبو عصام في الأجزاء الأخيرة (10 وما بعد)؟", "لم يحل بديل، بل عادت الشخصية، لكن في الجزء العاشر وما بعد تغير الطاقم بالكامل وأدى الدور 'تيسير إدريس' بشخصية مختلفة تماماً (أبو عزام)"],
        400: ["ما اسم المخرج الذي تولى إخراج المسلسل من الجزء العاشر حتى الأجزاء الحالية؟", "محمد زهير رجب"],
        600: ["في الجزء الأول، ما هي المهنة التي كان يمارسها 'أبو النار' قبل أن يصبح 'عكيد' حارة الماوي؟", "حداد"]
    },
    "رياضة (أولمبياد)": {
        200: ["ما هي المدينة التي استضافت أول دورة ألعاب أولمبية في العصر الحديث عام 1896؟", "أثينا"],
        400: ["من هو السباح الأسطوري الذي يحمل الرقم القياسي بـ 28 ميدالية أولمبية؟", "مايكل فيلبس"],
        600: ["ما هي الرياضة التي تم استبعادها من الأولمبياد ثم عادت في نسخة طوكيو 2020؟", "البيسبول / السوفت بول"]
    },
    "كرة قدم (عالمي)": {
        200: ["من هو اللاعب الملقب بـ 'صاروخ ماديرا'؟", "كريستيانو رونالدو"],
        400: ["كم عدد البطولات التي حققها المنتخب الألماني في كأس العالم؟", "4 بطولات"],
        600: ["من هو اللاعب الوحيد الذي سجل في 5 نسخ مختلفة من كأس العالم؟", "كريستيانو رونالدو"]
    },
    "تاريخ الأندلس": {200:["من هو القائد الذي فتح الأندلس؟","طارق بن زياد"], 400:["ما هو الاسم الذي أطلقه المسلمون على مدينة 'إشبيلية'؟","حمص (لقبت بها) أو إشبيلية نفسها"], 600:["من هو آخر حكام غرناطة قبل سقوطها؟","أبو عبد الله محمد الصغير"]},
    "فيزياء الكون": {200:["ما هو أسرع شيء في الكون؟","الضوء"], 400:["ما هو الاسم العلمي للقوة التي تجذب الأجسام نحو الأرض؟","الجاذبية"], 600:["من هو العالم الذي اكتشف 'مبدأ الطفو'؟","أرخميدس"]},
    "كيمياء العناصر": {200:["ما هو رمز عنصر الفضة؟","Ag"], 400:["ما هو العنصر الذي يمثل 78% من هواء الأرض؟","النيتروجين"], 600:["ما هو الغاز الذي يستخدم في إطفاء الحرائق؟","ثاني أكسيد الكربون"]},
    "عواصم": {200:["عاصمة البرتغال؟","لشبونة"], 400:["عاصمة كينيا؟","نيروبي"], 600:["عاصمة منغوليا؟","أولان باتور"]},
    "أدب": {200:["من كتب مسرحية 'هاملت'؟","ويليام شكسبير"], 400:["من هو مؤلف رواية 'شيفرة دافنشي'؟","دان براون"], 600:["ما هو لقب الشاعر 'أحمد شوقي'؟","أمير الشعراء"]},
    "جغرافيا": {200:["ما هو أكبر محيط في العالم؟","المحيط الهادئ"], 400:["أين توجد 'هضبة التبت'؟","الصين (وسط آسيا)"], 600:["ما هي الدولة التي تسمى 'أرض الشمس المشرقة'؟","اليابان"]},
    "تقنية": {200:["ماذا تعني اختصار 'RAM'؟","ذاكرة الوصول العشوائي"], 400:["من هو مؤسس شركة 'أبل'؟","ستيف جوبز (مع وزنياك ورونالد وين)"], 600:["ما هي أول لغة برمجة في التاريخ؟","أدا (Ada) أو فورتران كأول لغة عالية المستوى"]},
    "فضاء": {200:["كوكب يسمى 'الكوكب الأحمر'؟","المريخ"], 400:["ما هو اسم أول رائد فضاء في العالم؟","يوري غاغارين"], 600:["ما هي المجرة التي نعيش فيها؟","درب التبانة"]},
    "إسلاميات": {200:["ما هي أقصر سورة في القرآن؟","الكوثر"], 400:["من هو أول مؤذن في الإسلام؟","بلال بن رباح"], 600:["ما هي السورة التي تسمى 'عروس القرآن'؟","سورة الرحمن"]},
    "حيوانات": {200:["ما هو أثقل حيوان بري؟","الفيل الأفريقي"], 400:["كم عدد أرجل النحلة؟","6 أرجل"], 600:["ما هو الحيوان الذي قلبه في رأسه؟","الجمبري (الروبيان)"]},
    "نباتات": {200:["ما هو أطول نبات في العالم؟","الخشب الأحمر (السيكويا)"], 400:["ما هي الشجرة التي يستخرج منها 'المطاط'؟","شجرة الهيفيا"], 600:["ما هو العلم الذي يدرس النباتات؟","البوتاني (Botany)"]},
    "طب": {200:["ما هو العضو المسؤول عن تنقية الدم في الجسم؟","الكلى"], 400:["كم عدد صمامات قلب الإنسان؟","4 صمامات"], 600:["ما هو الهرمون الملقب بهرمون 'النمو'؟","السوماتوتروبين"]},
    "رياضيات": {200:["مربع الرقم 12؟","144"], 400:["ما هو الرقم الذي يسمى 'العدد الذهبي'؟","1.618"], 600:["من هو مؤسس علم الجبر؟","الخوارزمي"]},
    "اختراعات": {200:["من اخترع المذياع (الراديو)؟","ماركوني"], 400:["من اخترع المحرك النفاث؟","فرانك ويتل"], 600:["من اخترع آلة التصوير الفوتوغرافي؟","لويس داغير"]},
    "سينما": {200:["من هو مخرج فيلم 'الأفاتار'؟","جيمس كاميرون"], 400:["ما هي أول جائزة أوسكار فاز بها ممثل عربي؟","عمر الشريف (ترشيح) / رامي مالك (فوز)"], 600:["ما هو أول فيلم طويل للرسوم المتحركة في التاريخ؟","بياض الثلج والأقزام السبعة"]},
    "لغات": {200:["اللغة الرسمية في البرازيل؟","البرتغالية"], 400:["ما هي اللغة الأوسع انتشاراً في العالم؟","الإنجليزية"], 600:["ما هي اللغة التي تتحدث بها دولة 'إريتريا'؟","التغرينية (والعربية والإنجليزية)"]},
    "منطق": {200:["أخت خالك وليست خالتك؟","أمك"], 400:["كلما طال قصر، ما هو؟","العمر (أو السيجارة أو الشمعة)"], 600:["ما هو الشيء الذي يمشي بلا أرجل ويدخل الأذنين؟","الصوت"]},
    "حضارات": {200:["أين قامت حضارة المايا؟","أمريكا الوسطى (المكسيك)"], 400:["من هم بناة مدينة 'البتراء'؟","الأنباط"], 600:["ما هو اسم الكتاب المقدس عند الفرس القدماء؟","الأفستا"]},
    "سيارات": {200:["من هو مؤسس شركة 'تيسلا'؟","إيلون ماسك (مؤسس مشارك)"], 400:["ما هي جنسية شركة 'أودي'؟","ألمانية"], 600:["ما هي أول سيارة وصلت لسرعة 400 كم/س؟","بوجاتي فيرون"]},
    "حقائق": {200:["كم قلب للأخطبوط؟","3 قلوب"], 400:["ما هو المعدن السائل؟","الزئبق"], 600:["ما هو العضو الذي لا يصله الدم في جسم الإنسان؟","قرنية العين"]},
    "سيرة": {200:["ما اسم ناقة الرسول ﷺ؟","القصواء"], 400:["من هو الصحابي الملقب بـ 'ذي النورين'؟","عثمان بن عفان"], 600:["في أي عام وقعت غزوة الخندق؟","5 هجري"]},
    "ساعات": {200:["كم دقيقة في اليوم؟","1440"], 400:["أين توجد ساعة 'بيج بن'؟","لندن"], 600:["ما هي الساعة الذرية؟","ساعة تعتمد على اهتزازات الذرات لدقة الوقت"]},
    "بحار": {200:["ما هو أعمق محيط؟","المحيط الهادئ"], 400:["أين يقع 'مثلث برمودا'؟","المحيط الأطلسي"], 600:["ما هو البحر الذي لا تعيش فيه أسماك؟","البحر الميت"]},
    "فنون": {200:["من رسم لوحة 'العشاء الأخير'؟","ليوناردو دافنشي"], 400:["ما هو فن 'الأوريغامي'؟","طي الورق الياباني"], 600:["من هو رائد المدرسة التكعيبية؟","بابلو بيكاسو"]},
    "أساطير": {200:["من هو إله الرعد عند اليونان؟","زيوس"], 400:["ما هي 'ميدوسا'؟","وحش شعرها أفاعي"], 600:["من هو البطل الإغريقي الذي لا يموت إلا من كعبه؟","أخيل"]},
    "أمثال": {200:["من شب على شيء...؟","شاب عليه"], 400:["وافق شن...؟","طبقة"], 600:["ما قصة 'خفي حنين'؟","تضرب للخيبة والفشل"]},
    "برمجيات": {200:["ماذا يعني اختصار 'HTML'؟","لغة توصيف النص الفائق"], 400:["ما هو نظام التشغيل 'لينكس'؟","نظام مفتوح المصدر"], 600:["ماذا يعني 'API'؟","واجهة برمجة التطبيقات"]},
    "أرقام": {200:["ما هو العدد الأولي الوحيد الزوجي؟","2"], 400:["كم يساوي الرقم الروماني 'L'؟","50"], 600:["ما هو مجموع الزوايا الداخلية للسداسي؟","720"]},
    "عمارة": {200:["من صمم برج إيفل؟","غوستاف إيفل"], 400:["أين يقع 'برج بيزا المائل'؟","إيطاليا"], 600:["ما هو أطول جسر معلق في العالم؟","جسر تشاناكالي (تركيا)"]},
    "طيور": {200:["طائر لا يطير ويعيش في القارة القطبية؟","البطريق"], 400:["ما هو أسرع طائر؟","الصقر الجوال (شاهين)"], 600:["ما هو الطائر الذي ينام وهو يطير؟","السمامة"]},
    "اقتصاد": {200:["ما هي عملة الصين؟","اليوان"], 400:["ماذا يعني 'التضخم'؟","انخفاض القوة الشرائية للعملة"], 600:["من هو مؤسس شركة 'أمازون'؟","جيف بيزوس"]},
    "نفس": {200:["ما هو 'الرهاب'؟","الفوبيا"], 400:["من هو مؤسس التحليل النفسي؟","سيجموند فرويد"], 600:["ما هي 'النرجسية'؟","حب الذات المفرط"]},
    "كرتون": {200:["ما اسم القرية في السنافر؟","قرية السنافر"], 400:["من هو عدو 'ميكي ماوس'؟","دحبور (Pete)"], 600:["من هو مؤلف 'كابتن ماجد'؟","يويتشي تاكاهاشي"]},
    "تراث": {200:["ما هي الدبكة؟","رقصة شعبية بلاد الشام"], 400:["ما هو الزي التقليدي لليابان؟","الكيمونو"], 600:["ما هي 'العرضة'؟","رقصة تراثية سعودية"]},
    "طيور جارحة": {200:["ما هو ملك الطيور؟","النسر"], 400:["ما هو الطائر الذي يرى في الليل؟","البومة"], 600:["ما اسم صغير النسر؟","هيثم"]},
    "كيمياء حيوية": {200:["ما هو سكر الفواكه؟","الفركتوز"], 400:["ما هي المادة التي تلون الدم بالأحمر؟","الهيموجلوبين"], 600:["ما هو الإنزيم الهاضم للنشويات؟","الأميلاز"]},
    "حضارات قديمة": {200:["من بنى الأهرامات؟","الفراعنة"], 400:["أين قامت حضارة 'الأنكا'؟","بيرو"], 600:["ما هي 'بابل'؟","حضارة عراقية قديمة"]}
};

let selected = [], sc = [0, 0], trn = 1, curV = 0, clock, timeElapsed = 0;

const grid = document.getElementById('cats');
Object.keys(data).forEach(c => {
    let d = document.createElement('div');
    d.className = 'cat-btn'; d.innerText = c;
    d.onclick = () => {
        if(d.classList.contains('selected')) {
            d.classList.remove('selected'); selected = selected.filter(x => x !== c);
        } else if(selected.length < 6) {
            d.classList.add('selected'); selected.push(c);
        }
        document.getElementById('start').style.display = selected.length === 6 ? 'inline-block' : 'none';
    };
    grid.appendChild(d);
});

function initGame() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    const b = document.getElementById('board');
    selected.forEach(c => {
        let r = document.createElement('div');
        r.className = 'cat-row';
        r.innerHTML = `<div class="cat-name">${c}</div><div class="val-grid">
            <div class="val-btn" onclick="ask('${c}',200,this)">200</div>
            <div class="val-btn" onclick="ask('${c}',400,this)">400</div>
            <div class="val-btn" onclick="ask('${c}',600,this)">600</div>
        </div>`;
        b.appendChild(r);
    });
}

function ask(c, v, el) {
    el.classList.add('used'); curV = v;
    document.getElementById('qBox').style.display = 'flex';
    document.getElementById('qTxt').innerText = data[c][v][0];
    document.getElementById('aTxt').innerText = data[c][v][1];
    document.getElementById('aTxt').style.display = 'none';
    document.getElementById('showA').style.display = 'block';
    document.getElementById('ctrls').style.display = 'none';
    startClock();
}

function startClock() {
    timeElapsed = 0; 
    document.getElementById('clock').innerText = timeElapsed;
    clearInterval(clock);
    clock = setInterval(() => {
        timeElapsed++; 
        document.getElementById('clock').innerText = timeElapsed;
    }, 1000);
}

function reveal() {
    clearInterval(clock);
    document.getElementById('aTxt').style.display = 'block';
    document.getElementById('showA').style.display = 'none';
    document.getElementById('ctrls').style.display = 'flex';
}

function addPts(f) {
    sc[f-1] += curV;
    document.getElementById('p1').innerText = sc[0];
    document.getElementById('p2').innerText = sc[1];
    trn = trn === 1 ? 2 : 1;
    document.getElementById('turn').innerText = "دور فريق " + trn;
    closeQ();
}

function closeQ() { document.getElementById('qBox').style.display = 'none'; }
</script>
</body>
</html>
